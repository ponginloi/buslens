    <script>
        // ============================================================
        //  🛡️ 防止 XSS 攻击
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        //  API 工具
        // ============================================================
        var apiSupabaseClient = null;

        function initApiClient() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            if (!apiSupabaseClient) {
                try {
                    apiSupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('✅ API 客户端初始化成功');
                } catch (e) {
                    console.error('❌ API 客户端初始化失败:', e);
                    return false;
                }
            }
            return true;
        }

        async function getApiKey(keyName) {
            if (!initApiClient()) return null;
            try {
                const { data, error } = await apiSupabaseClient
                    .rpc('get_api_key', { key_name: keyName });
                if (error) {
                    console.error('❌ 获取 API 密钥失败:', error);
                    return null;
                }
                return data;
            } catch (e) {
                console.error('❌ 获取 API 密钥异常:', e);
                return null;
            }
        }

        async function uploadToImgBB(file) {
            try {
                const apiKey = await getApiKey('imgbb_key');
                if (!apiKey) {
                    throw new Error('无法获取 ImgBB API 密钥');
                }
                const formData = new FormData();
                formData.append('image', file);
                const response = await fetch('https://api.imgbb.com/1/upload?key=' + apiKey, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) {
                    throw new Error('图片上传失败 (HTTP ' + response.status + ')');
                }
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.error?.message || '图片上传失败');
                }
                return result.data.url;
            } catch (error) {
                console.error('❌ 上传失败:', error);
                throw error;
            }
        }

        // ============================================================
        //  初始化
        // ============================================================
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }
        initSupabase();

        // ============================================================
        //  用户状态
        // ============================================================
        function getCurrentUser() {
            try { var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function logout() {
            var user = getCurrentUser();
            if (user && user.role === 'admin') {
                supabaseClient
                    .from('users')
                    .update({ is_online: false })
                    .eq('id', user.id)
                    .then(function() {
                        sessionStorage.removeItem(SESSION_KEY);
                        window.location.href = 'index.html';
                    })
                    .catch(function() {
                        sessionStorage.removeItem(SESSION_KEY);
                        window.location.href = 'index.html';
                    });
            } else {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = 'index.html';
            }
        }

        function isAdmin() {
            var user = getCurrentUser();
            return user && user.role === 'admin';
        }

        function renderNav() {
            var nav = document.getElementById('navLinks');
            var user = getCurrentUser();

            if (user) {
                var admin = isAdmin();
                var pendingCount = window._pendingCount || 0;
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>' +
                    '<a href="profile.html">👤 个人中心</a>' +
                    (admin ? '<a href="admin.html">⚙️ 审核</a>' : '') +
                    (admin ? '<a href="admin_featured.html" class="active">📸 精选管理</a>' : '') +
                    (admin && pendingCount > 0 ? '<span class="pending-badge">📋 待审核 ' + pendingCount + '</span>' : '') +
                    '<a href="upload.html">📤 新机位</a>' +
                    '<span class="user-name">👤 ' + (admin ? '管理员 ' : '') + escapeHtml(user.username) + (admin ? ' 🔑' : '') + '</span>' +
                    '<button class="btn-logout" onclick="logout()">退出</button>';
            } else {
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>' +
                    '<a href="login.html">登录</a>' +
                    '<a href="register.html">注册</a>';
            }
        }

        function showToast(text, type) {
            var el = document.getElementById('toast');
            el.textContent = text;
            el.className = 'toast ' + (type || '') + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(function() { el.className = 'toast'; }, 3000);
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
                closeAddModal();
            }
        });

        // ============================================================
        //  精选照片管理
        // ============================================================
        var featuredPhotos = [];
        var allSpots = [];

        function renderFeaturedPhotos() {
            var container = document.getElementById('photoGrid');

            if (featuredPhotos.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="icon">📭</span><p>暂无精选照片</p><p style="font-size:13px;color:#bbb;">点击「添加精选」从已有照片中挑选 5 张</p></div>';
                return;
            }

            var html = '';
            featuredPhotos.forEach(function(p, index) {
                var isActive = p.is_active !== false;
                var statusText = isActive ? '✅ 展示中' : '⛔ 已隐藏';
                var statusClass = isActive ? '' : 'off';
                var dateStr = p.selected_at ? p.selected_at.slice(0, 10) : '未知';

                html +=
                    '<div class="photo-card" data-id="' + p.id + '">' +
                    '<div class="photo-img lazy-placeholder" data-src="' + escapeHtml(p.photo_url) + '" onclick="openLightbox(\'' + escapeHtml(p.photo_url) + '\')">📷</div>' +
                    '<div class="photo-body">' +
                    '<div class="photo-spot">📍 ' + escapeHtml(p.spot_name || '未知机位') + '</div>' +
                    '<div class="photo-meta">' +
                    '<span>📤 ' + escapeHtml(p.uploader || '未知') + '</span>' +
                    '<span>📅 ' + escapeHtml(dateStr) + '</span>' +
                    '</div>' +
                    (p.reason ? '<div class="photo-reason-box"><span class="label">💡 入选理由：</span>' + escapeHtml(p.reason) + '</div>' : '') +
                    '<div style="margin-top:4px;font-size:12px;color:#999;">🔢 顺序：' + (p.display_order || 0) + ' ｜ ' + statusText + '</div>' +
                    '</div>' +
                    '<div class="photo-actions">' +
                    '<button class="btn-up" onclick="movePhoto(' + index + ', -1)">⬆ 上移</button>' +
                    '<button class="btn-down" onclick="movePhoto(' + index + ', 1)">⬇ 下移</button>' +
                    '<button class="btn-toggle ' + statusClass + '" onclick="togglePhoto(' + index + ')">' + (isActive ? '🙈 隐藏' : '👀 显示') + '</button>' +
                    '<button class="btn-remove" onclick="removePhoto(' + index + ')">🗑️ 删除</button>' +
                    '</div>' +
                    '</div>';
            });

            container.innerHTML = html;
            initLazyLoad();
        }

        function updateStats() {
            var today = new Date().toISOString().slice(0, 10);
            var yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            var yesterdayStr = yesterday.toISOString().slice(0, 10);

            var todayCount = featuredPhotos.filter(function(p) {
                return p.selected_at && p.selected_at.slice(0, 10) === today && p.is_active !== false;
            }).length;
            var yesterdayCount = featuredPhotos.filter(function(p) {
                return p.selected_at && p.selected_at.slice(0, 10) === yesterdayStr && p.is_active !== false;
            }).length;

            document.getElementById('statToday').textContent = todayCount;
            document.getElementById('statYesterday').textContent = yesterdayCount;
            document.getElementById('statTotal').textContent = featuredPhotos.length;
        }

        function initLazyLoad() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                    var src = el.dataset.src;
                    if (src) {
                        var img = document.createElement('img');
                        img.src = src;
                        img.className = 'photo-img';
                        img.onclick = function() { openLightbox(src); };
                        el.parentNode.replaceChild(img, el);
                    }
                });
                return;
            }

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var el = entry.target;
                        var src = el.dataset.src;
                        if (src) {
                            var img = document.createElement('img');
                            img.src = src;
                            img.className = 'photo-img';
                            img.onclick = function() { openLightbox(src); };
                            el.parentNode.replaceChild(img, el);
                            observer.unobserve(el);
                        }
                    }
                });
            }, {
                rootMargin: '100px',
                threshold: 0.01
            });

            document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                observer.observe(el);
            });
        }

        function loadFeaturedPhotos() {
            var container = document.getElementById('photoGrid');
            container.innerHTML = '<div class="empty-state"><span class="icon">⟳</span><p>加载中...</p></div>';

            supabaseClient
                .from('featured_photos')
                .select('*')
                .order('selected_at', { ascending: false })
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    featuredPhotos = res.data || [];

                    renderFeaturedPhotos();
                    updateStats();
                })
                .catch(function(error) {
                    console.error('加载精选照片失败:', error);
                    container.innerHTML = '<div class="empty-state"><span class="icon">❌</span><p>加载失败：' + error.message + '</p></div>';
                });
        }

        // ============================================================
        //  加载所有机位和照片
        // ============================================================
        var allAvailablePhotos = [];
        var selectedPhotoUrls = [];

        function loadAllPhotosForSelect() {
            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    allSpots = res.data || [];
                    buildPhotoList();
                })
                .catch(function(error) {
                    console.error('加载机位失败:', error);
                });
        }

        function buildPhotoList() {
            allAvailablePhotos = [];
            var approvedSpots = allSpots.filter(function(s) { return s.status === 'approved'; });

            approvedSpots.forEach(function(spot) {
                var photos = spot.photos || [];
                var validPhotos = photos.filter(function(p) { return p.status !== 'rejected'; });
                validPhotos.forEach(function(p) {
                    allAvailablePhotos.push({
                        url: p.url,
                        spotId: spot.id,
                        spotName: spot.name,
                        uploader: p.uploader || p.uploaderName || '未知',
                        caption: p.caption || ''
                    });
                });
                if (spot.example_photo) {
                    allAvailablePhotos.push({
                        url: spot.example_photo,
                        spotId: spot.id,
                        spotName: spot.name,
                        uploader: spot.created_by || '未知',
                        caption: '📷 例图'
                    });
                }
            });

            var seen = {};
            allAvailablePhotos = allAvailablePhotos.filter(function(p) {
                if (seen[p.url]) return false;
                seen[p.url] = true;
                return true;
            });
        }

        // ============================================================
        //  添加弹窗
        // ============================================================
        function openAddModal() {
            selectedPhotoUrls = [];
            document.getElementById('addModal').classList.add('active');
            document.getElementById('inputReason').value = '';
            document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
            document.getElementById('modalMsg').className = 'modal-msg';
            document.getElementById('modalMsg').style.display = 'none';
            document.getElementById('addSubmitBtn').disabled = false;
            document.getElementById('addSubmitBtn').textContent = '✅ 确认添加（0张）';
            document.body.style.overflow = 'hidden';

            renderPhotoSelectGrid();
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function showModalMsg(text, type) {
            var el = document.getElementById('modalMsg');
            el.textContent = text;
            el.className = 'modal-msg ' + type;
            el.style.display = 'block';
        }

        function renderPhotoSelectGrid() {
            var container = document.getElementById('photoSelectGrid');

            if (allAvailablePhotos.length === 0) {
                container.innerHTML = '<div class="photo-select-empty">📭 暂无已审核通过的照片</div>';
                return;
            }

            var html = '';
            allAvailablePhotos.forEach(function(p, index) {
                var isSelected = selectedPhotoUrls.indexOf(p.url) !== -1;
                var selectedClass = isSelected ? 'selected' : '';
                html +=
                    '<div class="photo-select-item ' + selectedClass + '" onclick="togglePhotoSelect(' + index + ')">' +
                    '<img src="' + escapeHtml(p.url) + '" alt="' + escapeHtml(p.caption || '') + '" loading="lazy" />' +
                    '<div class="check-mark">✓</div>' +
                    '<div class="photo-label">' + escapeHtml(p.spotName + (p.caption ? ' - ' + p.caption : '')) + '</div>' +
                    '</div>';
            });

            container.innerHTML = html;
            updateSelectedCount();
        }

        function togglePhotoSelect(index) {
            var p = allAvailablePhotos[index];
            var idx = selectedPhotoUrls.indexOf(p.url);

            if (idx !== -1) {
                selectedPhotoUrls.splice(idx, 1);
            } else {
                if (selectedPhotoUrls.length >= 5) {
                    showModalMsg('⚠️ 最多只能选择 5 张照片', 'error');
                    return;
                }
                selectedPhotoUrls.push(p.url);
            }

            renderPhotoSelectGrid();
            updateSelectedCount();
            document.getElementById('modalMsg').style.display = 'none';
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedPhotoUrls.length;
            var btn = document.getElementById('addSubmitBtn');
            btn.textContent = '✅ 确认添加（' + selectedPhotoUrls.length + '张）';
            btn.disabled = selectedPhotoUrls.length === 0;
        }

        function submitFeatured() {
            if (selectedPhotoUrls.length === 0) {
                showModalMsg('❌ 请至少选择 1 张照片', 'error');
                return;
            }

            var user = getCurrentUser();
            if (!user) {
                showModalMsg('❌ 请先登录', 'error');
                return;
            }

            var reason = document.getElementById('inputReason').value.trim();
            var date = document.getElementById('inputDate').value || new Date().toISOString().slice(0, 10);

            var btn = document.getElementById('addSubmitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 提交中...';
            showModalMsg('⏳ 正在保存 ' + selectedPhotoUrls.length + ' 张精选照片...', 'loading');

            var insertData = selectedPhotoUrls.map(function(url, index) {
                var photoInfo = allAvailablePhotos.find(function(p) { return p.url === url; });
                return {
                    photo_url: url,
                    spot_id: photoInfo ? photoInfo.spotId : null,
                    spot_name: photoInfo ? photoInfo.spotName : '',
                    uploader: photoInfo ? photoInfo.uploader : '',
                    caption: photoInfo ? photoInfo.caption : '',
                    reason: reason || '',
                    selected_by: user.username,
                    selected_at: date + 'T00:00:00Z',
                    is_active: true,
                    display_order: index
                };
            });

            supabaseClient
                .from('featured_photos')
                .insert(insertData)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    showModalMsg('✅ 已添加 ' + selectedPhotoUrls.length + ' 张精选照片！', 'success');
                    showToast('✅ 精选照片已添加', 'success');
                    btn.textContent = '✅ 已添加';
                    setTimeout(function() {
                        closeAddModal();
                        loadFeaturedPhotos();
                    }, 1000);
                })
                .catch(function(error) {
                    console.error('添加失败:', error);
                    showModalMsg('❌ 添加失败：' + error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '✅ 确认添加（' + selectedPhotoUrls.length + '张）';
                });
        }

        // ============================================================
        //  移动顺序
        // ============================================================
        function movePhoto(index, direction) {
            var newIndex = index + direction;
            if (newIndex < 0 || newIndex >= featuredPhotos.length) return;

            var temp = featuredPhotos[index];
            featuredPhotos[index] = featuredPhotos[newIndex];
            featuredPhotos[newIndex] = temp;

            var updates = featuredPhotos.map(function(p, i) {
                return { id: p.id, display_order: i };
            });

            var promises = updates.map(function(u) {
                return supabaseClient
                    .from('featured_photos')
                    .update({ display_order: u.display_order })
                    .eq('id', u.id);
            });

            Promise.all(promises)
                .then(function() {
                    showToast('✅ 顺序已更新', 'success');
                    loadFeaturedPhotos();
                })
                .catch(function(error) {
                    console.error('移动失败:', error);
                    showToast('❌ 移动失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  切换显示/隐藏
        // ============================================================
        function togglePhoto(index) {
            var p = featuredPhotos[index];
            var newStatus = !p.is_active;

            supabaseClient
                .from('featured_photos')
                .update({ is_active: newStatus })
                .eq('id', p.id)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    showToast(newStatus ? '✅ 已显示' : '🙈 已隐藏', 'success');
                    loadFeaturedPhotos();
                })
                .catch(function(error) {
                    console.error('切换失败:', error);
                    showToast('❌ 操作失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  ✅ 删除精选照片（修复版）
        // ============================================================
        function removePhoto(index) {
            var p = featuredPhotos[index];
            if (!p) {
                showToast('❌ 照片不存在', 'error');
                return;
            }

            var user = getCurrentUser();
            if (!user || user.role !== 'admin') {
                showToast('❌ 只有管理员可以删除', 'error');
                return;
            }

            if (!confirm('确认删除「' + escapeHtml(p.spot_name || '未命名') + '」的精选照片？')) return;

            console.log('🗑️ 删除精选照片 ID:', p.id);

            supabaseClient
                .from('featured_photos')
                .delete()
                .eq('id', p.id)
                .then(function(res) {
                    if (res.error) {
                        console.error('❌ 删除失败:', res.error);
                        showToast('❌ 删除失败：' + res.error.message, 'error');
                        return;
                    }
                    console.log('✅ 删除成功');
                    showToast('🗑️ 已删除', 'success');

                    // ✅ 从本地数组中移除
                    featuredPhotos.splice(index, 1);

                    // ✅ 重新渲染
                    renderFeaturedPhotos();

                    // ✅ 更新统计
                    updateStats();
                })
                .catch(function(error) {
                    console.error('❌ 删除异常:', error);
                    showToast('❌ 删除失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  启动
        // ============================================================
        (function init() {
            var user = getCurrentUser();

            if (!user) {
                document.getElementById('photoGrid').innerHTML =
                    '<div class="empty-state"><span class="icon">🔒</span><p>请先登录</p></div>';
                return;
            }

            if (!isAdmin()) {
                document.getElementById('photoGrid').innerHTML =
                    '<div class="empty-state"><span class="icon">🚫</span><p>只有管理员可以管理精选照片</p></div>';
                return;
            }

            renderNav();
            loadFeaturedPhotos();
            loadAllPhotosForSelect();

            console.log('📸 精选照片管理已加载');
            console.log('👑 管理员已验证');
        })();
    </script>
</body>
</html>
