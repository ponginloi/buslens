                        <button class="btn-save-bio" onclick="saveBio()">💾 保存</button>

        <div class="progress-section" id="progressSection">

            <div class="progress-bar-wrap">

        // ============================================================
        //  🚀 滚动懒加载
        // ============================================================
        function initLazyLoad() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                    var src = el.dataset.src;
                    if (src) {
                        var img = document.createElement('img');
                        img.src = src;
                        img.alt = '';
                        img.loading = 'lazy';
                        el.parentNode.replaceChild(img, el);
                    }
                });
                document.querySelectorAll('.photo-thumb.lazy-placeholder[data-src]').forEach(function(el) {
                    var src = el.dataset.src;
                    if (src) {
                        var img = document.createElement('img');
                        img.src = src;
                        img.alt = '';
                        img.className = 'photo-thumb';
                        img.loading = 'lazy';
                        img.onclick = function() { window.open(src, '_blank'); };
                        el.parentNode.replaceChild(img, el);
                    }
                });
                return;
            }

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var el = entry.target;
                        var src = el.dataset.src;
                        if (src) {
                            if (el.classList.contains('lazy-placeholder')) {
                                var img = document.createElement('img');
                                img.src = src;
                                img.alt = '';
                                img.loading = 'lazy';
                                el.parentNode.replaceChild(img, el);
                            } else if (el.classList.contains('photo-thumb')) {
                                var img = document.createElement('img');
                                img.src = src;
                                img.alt = '';
                                img.className = 'photo-thumb';
                                img.loading = 'lazy';
                                img.onclick = function() { window.open(src, '_blank'); };
                                el.parentNode.replaceChild(img, el);
                            }
                            observer.unobserve(el);
                        }
                    }
                });
            }, {
                rootMargin: '100px',
                threshold: 0.01
            });

            document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                observer.observe(el);
            });
            document.querySelectorAll('.photo-thumb.lazy-placeholder[data-src]').forEach(function(el) {
                observer.observe(el);
            });

            console.log('👤 个人中心懒加载已启动，共 ' +
                document.querySelectorAll('.lazy-placeholder[data-src]').length + ' 张画廊图片 + ' +
                document.querySelectorAll('.photo-thumb.lazy-placeholder[data-src]').length + ' 张缩略图待加载');
        }

        function getTitle(spotCount, approvedCount, highRankCount, photoCount) {

                return { title: '⚡ 巴士之神', class: 'legend', next: '🏆 已达最高等级' };
            }
            if (spotCount >= 80 && approvedCount >= 80 && highRankCount >= 18 && photoCount >= 50) {
                return { title: '👑 巴士传奇', class: 'master',
                    next: '⚡ 还需 ' + (150 - spotCount) + ' 个机位、' + (35 - highRankCount) + ' 个上等、' + (100 - photoCount) +
                        ' 张照片'
                };
            }
            if (spotCount >= 40 && approvedCount >= 40 && highRankCount >= 8 && photoCount >= 25) {
                return { title: '📷 巴士摄影大师', class: 'photographer',
                    next: '👑 还需 ' + (80 - spotCount) + ' 个机位、' + (18 - highRankCount) + ' 个上等、' + (50 - photoCount) +
                        ' 张照片'

            }
            if (spotCount >= 20 && approvedCount >= 20 && highRankCount >= 3 && photoCount >= 12) {
                return { title: '🔍 巴士探索家', class: 'explorer',
                    next: '📷 还需 ' + (40 - spotCount) + ' 个机位、' + (8 - highRankCount) + ' 个上等、' + (25 - photoCount) +
                        ' 张照片'
                };
            }
            if (spotCount >= 8 && approvedCount >= 8 && photoCount >= 5) {
                return { title: '📝 巴士记录者', class: 'recorder',
                    next: '🔍 还需 ' + (20 - spotCount) + ' 个机位、' + (3 - highRankCount) + ' 个上等、' + (12 - photoCount) +
                        ' 张照片'

            }
            return { title: '🌱 巴士萌新', class: 'beginner',
                next: '📝 还需 ' + (8 - spotCount) + ' 个通过机位、' + (5 - photoCount) + ' 张照片'

        // ============================================================
        //  渲染最近活跃
        // ============================================================
        function renderRecent(mySpots, allSpots) {
            var container = document.getElementById('recentList');

            var recentItems = [];

            var recentSpots = mySpots.slice(-3).reverse();
            recentSpots.forEach(function(s) {
                recentItems.push({
                    icon: '📌',
                    text: '上传了机位 <a href="index.html?spot_id=' + s.id + '">' + s.name + '</a>',
                    time: s.created_at || '最近'
                });
            });

            mySpots.forEach(function(s) {
                if (s.photos) {
                    s.photos.forEach(function(p) {
                        if (p.date) {
                            recentItems.push({
                                icon: '📸',
                                text: '在 <a href="index.html?spot_id=' + s.id + '">' + s.name +
                                '</a> 上传了照片',
                                time: p.date
                            });
                        }
                    });
                }
            });

            recentItems.sort(function(a, b) {
                return (b.time || '').localeCompare(a.time || '');
            });
            recentItems = recentItems.slice(0, 5);

            if (recentItems.length === 0) {
                container.innerHTML = '<div style="color:#999;font-size:14px;padding:8px 0;">暂无活跃记录</div>';
                return;
            }

            container.innerHTML = recentItems.map(function(item) {
                return '<div class="recent-item">' +
                    '<span class="recent-icon">' + item.icon + '</span>' +
                    '<span>' + item.text + '</span>' +
                    '<span class="recent-time">' + item.time + '</span>' +
                    '</div>';
            }).join('');
        }

        // ============================================================
        //  渲染作品展示墙（懒加载版）
        // ============================================================
        function renderGallery(mySpots, username) {
            var container = document.getElementById('galleryGrid');

            var allPhotos = [];
            mySpots.forEach(function(s) {
                if (s.example_photo && s.created_by === username) {
                    allPhotos.push({
                        url: s.example_photo,
                        caption: '📷 例图 - ' + s.name
                    });
                }
                if (s.photos) {
                    s.photos.forEach(function(p) {
                        if ((p.uploader === username || p.uploaderName === username) && p.status !== 'rejected') {
                            allPhotos.push({
                                url: p.url,
                                caption: p.caption || '📸 ' + s.name
                            });
                        }
                    });
                }
            });

            if (allPhotos.length === 0) {
                container.innerHTML = '<div class="gallery-empty"><span class="icon">🖼️</span><p>暂无作品</p></div>';
                return;
            }

            var displayPhotos = allPhotos.slice(-20).reverse();

            container.innerHTML = displayPhotos.map(function(p) {
                return '<div class="gallery-item" onclick="openLightbox(\'' + p.url + '\')">' +
                    '<div class="lazy-placeholder" data-src="' + p.url + '">📷</div>' +
                    '<div class="gallery-overlay">' + (p.caption || '作品') + '</div>' +
                    '</div>';
            }).join('');

            setTimeout(function() {
                initLazyLoad();
            }, 100);
        }

        // ============================================================
        //  loadUserProfile - 加载用户数据
        // ============================================================
        function loadUserProfile(username, isOwn) {
            document.getElementById('userName').textContent = '👤 ' + username;

            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var allSpots = res.data || [];

                    var mySpots = allSpots.filter(function(s) {
                        return s.created_by === username;
                    });
                    var myPending = mySpots.filter(function(s) { return s.status === 'pending'; });
                    var myApproved = mySpots.filter(function(s) { return s.status === 'approved'; });
                    var myRejected = mySpots.filter(function(s) { return s.status === 'rejected'; });
                    var myHighRank = mySpots.filter(function(s) { return s.rank === 'high' && s.status === 'approved'; });

                    var photoCount = 0;
                    mySpots.forEach(function(s) {
                        if (s.photos) {
                            s.photos.forEach(function(p) {
                                if (p.uploader === username || p.uploaderName === username) {
                                    photoCount++;
                                }
                            });
                        }
                        if (s.example_photo && s.created_by === username) {
                            photoCount++;
                        }
                    });

                    document.getElementById('statSpots').textContent = mySpots.length;
                    document.getElementById('statPhotos').textContent = photoCount;
                    document.getElementById('statHighRank').textContent = myHighRank.length;
                    document.getElementById('statPending').textContent = myPending.length;

                    var titleInfo = getTitle(mySpots.length, myApproved.length, myHighRank.length, photoCount);
                    var badge = document.getElementById('titleBadge');
                    badge.textContent = titleInfo.title;
                    badge.className = 'title-badge ' + titleInfo.class;
                    document.getElementById('titleHint').innerHTML = '📌 下一级：' + titleInfo.next;

                    var total = mySpots.length || 1;
                    var pendingPct = (myPending.length / total * 100);
                    var approvedPct = (myApproved.length / total * 100);
                    var rejectedPct = (myRejected.length / total * 100);

                    document.getElementById('progressPending').style.width = pendingPct + '%';
                    document.getElementById('progressPending').textContent = '⏳ ' + myPending.length;
                    document.getElementById('progressApproved').style.width = approvedPct + '%';
                    document.getElementById('progressApproved').textContent = '✅ ' + myApproved.length;
                    document.getElementById('progressRejected').style.width = rejectedPct + '%';
                    document.getElementById('progressRejected').textContent = '❌ ' + myRejected.length;
                    document.getElementById('progressTotal').textContent = '总计：' + mySpots.length + ' 张';

                    var badges = getBadges(mySpots.length, myApproved.length, myHighRank.length, photoCount);
                    renderBadges(badges);

                    renderRecent(mySpots, allSpots);

                    renderGallery(mySpots, username);

                    loadBio(username);

                    window._pendingCount = myPending.length;

                    renderPending(allSpots, username);
                    renderMySpots(allSpots, username);
                    renderMyPhotos(allSpots, username);
                    renderFavorites(username);

                    renderNav();

                    if (!isOwn) {
                        document.getElementById('userEmail').textContent = '📌 查看他人主页';
                        document.getElementById('editBioBtn').style.display = 'none';
                    } else {
                        var user = getCurrentUser();
                        document.getElementById('userEmail').textContent = user.email || '无邮箱';
                        document.getElementById('editBioBtn').style.display = '';
                    }
                })
                .catch(function(error) {
                    console.error('加载失败:', error);
                });
        }

        // ============================================================
        //  🗑️ 删除机位功能（仅限自己的机位）
        // ============================================================
        function deleteMySpot(spotId, spotName) {
            var user = getCurrentUser();
            if (!user) {
                alert('请先登录');
                return;
            }

            if (!confirm('⚠️ 确定要删除「' + spotName + '」吗？\n\n删除后该机位及其所有照片将被永久移除，不可恢复！')) {
                return;
            }

            if (!confirm('再次确认：删除「' + spotName + '」？')) {
                return;
            }

            supabaseClient
                .from('spots')
                .delete()
                .eq('id', spotId)
                .eq('created_by', user.username)
                .then(function(res) {
                    if (res.error) {
                        console.error('删除失败:', res.error);
                        alert('❌ 删除失败：' + res.error.message);
                        return;
                    }
                    alert('✅ 已成功删除机位「' + spotName + '」');
                    loadUserProfile(user.username, true);
                })
                .catch(function(error) {
                    console.error('删除失败:', error);
                    alert('❌ 删除失败：' + error.message);
                });
        }

        // ============================================================
        //  🗑️ 删除自己上传的照片
        // ============================================================
        async function deleteMyPhoto(spotId, photoId, spotName) {
            var user = getCurrentUser();
            if (!user) {
                alert('请先登录');
                return;
            }

            if (!confirm('⚠️ 确定要删除「' + spotName + '」中的这张照片吗？\n\n删除后不可恢复！')) {
                return;
            }

            try {
                var res = await supabaseClient
                    .from('spots')
                    .select('photos')
                    .eq('id', spotId)
                    .single();

                if (res.error) throw new Error(res.error.message);
                var spot = res.data;
                if (!spot) throw new Error('机位不存在');

                var photos = spot.photos || [];
                var filteredPhotos = photos.filter(function(p) {
                    return p.id !== photoId;
                });

                if (filteredPhotos.length === photos.length) {
                    alert('❌ 照片不存在或已被删除');
                    return;
                }

                var updateRes = await supabaseClient
                    .from('spots')
                    .update({ photos: filteredPhotos })
                    .eq('id', spotId);

                if (updateRes.error) throw new Error(updateRes.error.message);

                alert('✅ 已成功删除照片');
                var currentUser = getCurrentUser();
                loadUserProfile(currentUser.username, true);

            } catch (error) {
                console.error('删除失败:', error);
                alert('❌ 删除失败：' + error.message);
            }
        }

        // ============================================================
        //  渲染函数
        // ============================================================
        function renderPending(spots, username) {
            var pending = spots.filter(function(s) {
                return s.created_by === username && s.status === 'pending';
            });
            var container = document.getElementById('pendingList');
            document.getElementById('pendingBadge').textContent = pending.length;

            if (pending.length === 0) {
                container.innerHTML =
                    '<div class="empty-state"><span class="icon">✅</span><p>暂无待审核的机位</p><p style="font-size:13px;margin-top:4px;">去 <a href="upload.html">上传</a> 一个新机位吧</p></div>';
                return;
            }

            container.innerHTML = pending.map(function(s) {
                return '<div class="item-card">' +
                    '<div class="left">' +
                    '<div class="title">' + s.name + '</div>' +
                    '<div class="meta">' +
                    '<span>📅 ' + (s.created_at || '未知') + '</span>' +
                    '<span class="rank-badge ' + s.rank + '">' + (s.rank === 'high' ? '上等' : s.rank === 'medium' ?
                        '中等' : '下等') + '</span>' +
                    '<span class="status-badge pending">⏳ 待审核</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="right">' +
                    '<span style="font-size:13px;color:#999;">📍 ' + s.lng + ', ' + s.lat + '</span>' +
                    '<button class="btn-delete-spot" onclick="deleteMySpot(\'' + s.id + '\', \'' + s.name.replace(/'/g, "\\'") + '\')">🗑️ 删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function renderMySpots(spots, username) {
            var mySpots = spots.filter(function(s) {
                return s.created_by === username && s.status === 'approved';
            });
            var container = document.getElementById('spotsList');
            document.getElementById('spotsBadge').textContent = mySpots.length;

            if (mySpots.length === 0) {
                container.innerHTML =
                    '<div class="empty-state"><span class="icon">📌</span><p>暂无已审核通过的机位</p><p style="font-size:13px;margin-top:4px;">去 <a href="upload.html">上传</a> 第一个机位吧</p></div>';
                return;
            }

            var statusMap = { pending: '⏳ 待审核', approved: '✅ 已通过', rejected: '❌ 已拒绝' };

            container.innerHTML = mySpots.map(function(s) {
                var statusClass = s.status || 'pending';
                var reasonHtml = s.review_reason ? '<div style="font-size:12px;color:#f44336;margin-top:2px;">📝 审核意见：' +
                    s.review_reason + '</div>' : '';
                return '<div class="item-card">' +
                    '<div class="left">' +
                    '<div class="title">' + s.name + '</div>' +
                    '<div class="meta">' +
                    '<span>📅 ' + (s.created_at || '未知') + '</span>' +
                    '<span class="rank-badge ' + s.rank + '">' + (s.rank === 'high' ? '上等' : s.rank === 'medium' ?
                        '中等' : '下等') + '</span>' +
                    '<span class="status-badge ' + statusClass + '">' + (statusMap[statusClass] || '未知') + '</span>' +
                    (s.reviewed_by ? '<span style="font-size:12px;color:#999;">审核人：' + s.reviewed_by + '</span>' : '') +
                    '</div>' +
                    reasonHtml +
                    '</div>' +
                    '<div class="right">' +
                    '<span style="font-size:13px;color:#999;">📍 ' + s.lng + ', ' + s.lat + '</span>' +
                    '<a href="index.html?spot_id=' + s.id + '" class="view-link">查看地图 →</a>' +
                    '<button class="btn-delete-spot" onclick="deleteMySpot(\'' + s.id + '\', \'' + s.name.replace(/'/g, "\\'") + '\')">🗑️ 删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        // ============================================================
        //  渲染我的照片列表（增加删除按钮）
        // ============================================================
        function renderMyPhotos(spots, username) {
            var allPhotos = [];
            spots.forEach(function(spot) {
                if (spot.photos && spot.photos.length > 0) {
                    spot.photos.forEach(function(p) {
                        if (p.uploader === username || p.uploaderName === username) {
                            allPhotos.push({
                                photo: p,
                                spotName: spot.name,
                                spotId: spot.id,
                                spotRank: spot.rank,
                                spotStatus: spot.status
                            });
                        }
                    });
                }
            });

            var container = document.getElementById('photosList');
            document.getElementById('photosBadge').textContent = allPhotos.length;

            if (allPhotos.length === 0) {
                container.innerHTML =
                    '<div class="empty-state"><span class="icon">📸</span><p>你还没有上传过照片</p><p style="font-size:13px;margin-top:4px;">去机位详情页上传照片吧</p></div>';
                return;
            }

            container.innerHTML = allPhotos.map(function(item) {
                var p = item.photo;
                return '<div class="item-card">' +
                    '<div class="left">' +
                    '<div class="title">' + item.spotName + '</div>' +
                    '<div class="meta">' +
                    '<span>📅 ' + (p.date || p.created_at || '未知') + '</span>' +
                    '<span class="rank-badge ' + item.spotRank + '">' + (item.spotRank === 'high' ? '上等' : item
                        .spotRank === 'medium' ? '中等' : '下等') + '</span>' +
                    '<span class="status-badge ' + (item.spotStatus || 'pending') + '">' + (item.spotStatus ===
                        'approved' ? '✅ 已通过' : item.spotStatus === 'pending' ? '⏳ 待审核' : '❌ 已拒绝') +
                    '</span>' +
                    '</div>' +
                    (p.caption ? '<div style="font-size:13px;color:#666;margin-top:2px;">📝 ' + p.caption + '</div>' :
                        '') +
                    '</div>' +
                    '<div class="right">' +
                    '<div class="photo-thumb lazy-placeholder" data-src="' + p.url + '">📷</div>' +
                    '<a href="index.html?spot_id=' + item.spotId + '" class="view-link">查看地图 →</a>' +
                    '<button class="btn-delete-photo" onclick="deleteMyPhoto(\'' + item.spotId + '\', \'' + p.id + '\', \'' + item.spotName.replace(/'/g, "\\'") + '\')">🗑️</button>' +
                    '</div>' +
                    '</div>';
            }).join('');

            setTimeout(function() {
                initLazyLoad();
            }, 100);
        }

        // ============================================================
        //  ⭐ 我的收藏
        // ============================================================
        function renderFavorites(username) {
            var user = getCurrentUser();
            if (!user || user.username !== username) {
                document.getElementById('favoritesList').innerHTML =
                    '<div class="empty-state"><span class="icon">🔒</span><p>查看他人主页时不可见</p></div>';
                document.getElementById('favoritesBadge').textContent = '🔒';
                return;
            }

            supabaseClient
                .from('favorites')
                .select('spot_id')
                .eq('user_id', user.id)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var favoriteIds = (res.data || []).map(function(f) { return f.spot_id; });
                    document.getElementById('favoritesBadge').textContent = favoriteIds.length;

                    if (favoriteIds.length === 0) {
                        document.getElementById('favoritesList').innerHTML =
                            '<div class="empty-state"><span class="icon">⭐</span><p>你还没有收藏任何机位</p><p style="font-size:13px;margin-top:4px;">去地图上寻找喜欢的机位吧</p></div>';
                        return;
                    }

                    supabaseClient
                        .from('spots')
                        .select('*')
                        .in('id', favoriteIds)
                        .then(function(spotRes) {
                            if (spotRes.error) throw new Error(spotRes.error.message);
                            var spots = spotRes.data || [];

                            var container = document.getElementById('favoritesList');
                            container.innerHTML = spots.map(function(spot) {
                                return '<div class="item-card">' +
                                    '<div class="left">' +
                                    '<div class="title">' + spot.name + '</div>' +
                                    '<div class="meta">' +
                                    '<span class="rank-badge ' + spot.rank + '">' + (spot.rank === 'high' ?
                                        '上等' : spot.rank === 'medium' ? '中等' : '下等') + '</span>' +
                                    '<span>📍 ' + spot.lng + ', ' + spot.lat + '</span>' +
                                    '</div>' +
                                    '</div>' +
                                    '<div class="right">' +
                                    '<a href="index.html?spot_id=' + spot.id + '" class="view-link">查看地图 →</a>' +
                                    '</div>' +
                                    '</div>';
                            }).join('');
                        })
                        .catch(function(error) {
                            console.error('加载收藏机位失败:', error);
                        });
                })
                .catch(function(error) {
                    console.error('加载收藏列表失败:', error);
                });
        }

        // ============================================================
        //  loadProfile - 入口
        // ============================================================
        function loadProfile() {
            var params = new URLSearchParams(window.location.search);
            var targetUser = params.get('user');

            var currentUser = getCurrentUser();

            if (!targetUser || (currentUser && targetUser === currentUser.username)) {
                if (!currentUser) {
                    window.location.href = 'login.html';
                    return;
                }
                loadUserProfile(currentUser.username, true);
            } else {
                loadUserProfile(targetUser, false);
            }
        }

        // ============================================================
        //  启动
        // ============================================================
        renderNav();
        loadProfile();

        console.log('👤 个人中心已加载（懒加载版 - 滚动到才加载图片 + 删除机位 + 删除照片）');
    </script>
</body>
</html>
