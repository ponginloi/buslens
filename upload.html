        .example-preview {

        .message {

        .message.error {

            color: #d32f2f;
        }
        .message.success {

        @media (max-width: 600px) {

    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="brand"><span>🚌</span> BusLens</a>

    <div class="status-msg" id="statusMsg"></div>

    <script>
        window._AMapSecurityConfig = {
            securityJsCode: '32cb0dfc6330c69e2d13dd3164cea242'
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=404164dc78620cbc5d9440e9b2ed5e85">
    </script>

    <script>
        // ============================================================
        //  初始化 Supabase
        // ============================================================
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }
        initSupabase();

        // ============================================================
        //  用户状态
        // ============================================================
        var SESSION_KEY = 'bus_user_session';
        var ADMIN_USERNAME = 'ponginloi';

        function getCurrentUser() {
            try { var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            location.reload();
        }

        function isAdmin() {
            var user = getCurrentUser();
            return user && user.username === ADMIN_USERNAME;
        }

        function renderNav() {
            var nav = document.getElementById('navLinks');
            var user = getCurrentUser();
            if (user) {
                var admin = isAdmin();
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="profile.html">👤 个人中心</a>' +
                    (admin ? '<a href="admin.html">⚙️ 审核</a>' : '') +
                    '<a href="upload.html" class="active">📤 新机位</a>' +
                    '<span class="user-name">👤 ' + user.username + (admin ? '<span class="admin-badge">管理员</span>' : '') + '</span>' +
                    '<button class="btn-logout" onclick="logout()">退出</button>';
            } else {
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="login.html">登录</a>' +
                    '<a href="register.html">注册</a>';
            }
        }

        function showMessage(text, type) {
            var el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        function showStatus(text, type) {
            var el = document.getElementById('statusMsg');
            el.textContent = text;
            el.className = 'status-msg show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(function() {
                el.className = 'status-msg';
            }, 4000);
        }

        // ============================================================
        //  例图预览
        // ============================================================
        var examplePhotoFile = null;

        document.getElementById('examplePhoto').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { alert('照片大小不能超过 10MB'); this.value = ''; return; }
            examplePhotoFile = file;
            var reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('examplePreviewImg').src = ev.target.result;
                document.getElementById('examplePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        function removeExamplePhoto() {
            examplePhotoFile = null;
            document.getElementById('examplePhoto').value = '';
            document.getElementById('examplePreview').style.display = 'none';
        }

        // ============================================================
        //  小地图选点
        // ============================================================
        var pickerMap = null;
        var currentLng = 114.169;
        var currentLat = 22.300;

        function initPickerMap() {
            pickerMap = new AMap.Map('pickerMap', {
                zoom: 15,
                center: [currentLng, currentLat],
                mapStyle: 'amap://styles/whitesmoke',
                viewMode: '2D',
                pitch: 0,
                zoomEnable: true,
                dragEnable: true,
                showIndoorMap: false
            });

            pickerMap.on('moveend', function() {
                var center = pickerMap.getCenter();
                currentLng = Math.round(center.getLng() * 1000000) / 1000000;
                currentLat = Math.round(center.getLat() * 1000000) / 1000000;
                updateCoords();
            });

            pickerMap.on('zoomend', function() {
                var center = pickerMap.getCenter();
                currentLng = Math.round(center.getLng() * 1000000) / 1000000;
                currentLat = Math.round(center.getLat() * 1000000) / 1000000;
                updateCoords();
            });

            pickerMap.on('complete', function() {
                console.log('🗺️ 小地图加载完成');
                updateCoords();
            });
        }

        function updateCoords() {
            document.getElementById('displayLng').textContent = currentLng;
            document.getElementById('displayLat').textContent = currentLat;
            document.getElementById('lng').value = currentLng;
            document.getElementById('lat').value = currentLat;
        }

        function syncFromInputs() {
            var lng = parseFloat(document.getElementById('lng').value);
            var lat = parseFloat(document.getElementById('lat').value);
            if (!isNaN(lng) && !isNaN(lat)) {
                currentLng = lng;
                currentLat = lat;
                if (pickerMap) {
                    pickerMap.setCenter([currentLng, currentLat]);
                }
                updateCoords();
            }
        }

        function locateMe() {
            if (!navigator.geolocation) {
                alert('您的浏览器不支持定位功能');
                return;
            }
            var btn = document.getElementById('locateBtn');
            btn.textContent = '⏳';
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    currentLng = Math.round(pos.coords.longitude * 1000000) / 1000000;
                    currentLat = Math.round(pos.coords.latitude * 1000000) / 1000000;
                    if (pickerMap) {
                        pickerMap.setCenter([currentLng, currentLat]);
                    }
                    updateCoords();
                    btn.textContent = '📍';
                    showMessage('✅ 已定位到您的位置', 'success');
                    setTimeout(function() {
                        var msg = document.getElementById('message');
                        msg.className = 'message';
                        msg.style.display = 'none';
                    }, 2000);
                },
                function(err) {
                    btn.textContent = '📍';
                    alert('定位失败：' + err.message);
                }, {
                    enableHighAccuracy: true,
                    timeout: 10000
                }
            );
        }

        // ============================================================
        //  📤 上传图片到 ImgBB
        // ============================================================
        function uploadToImgBB(file) {
            var formData = new FormData();
            formData.append('image', file);
            return fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, {
                    method: 'POST',
                    body: formData
                })
                .then(function(response) {
                    if (!response.ok) throw new Error('图片上传失败 (HTTP ' + response.status + ')');
                    return response.json();
                })
                .then(function(result) {
                    if (!result.success) {
                        throw new Error(result.error?.message || '图片上传失败');
                    }
                    return result.data.url;
                });
        }

        // ============================================================
        //  提交表单（保存到 Supabase）
        // ============================================================
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            var user = getCurrentUser();
            if (!user) {
                showMessage('❌ 请先登录再上传机位！', 'error');
                return;
            }

            var name = document.getElementById('spotName').value.trim();
            var lng = parseFloat(document.getElementById('lng').value);
            var lat = parseFloat(document.getElementById('lat').value);
            var rank = document.querySelector('input[name="rank"]:checked').value;
            var description = document.getElementById('description').value.trim();

            if (!name) { showMessage('❌ 请填写机位名称', 'error'); return; }
            if (isNaN(lng) || isNaN(lat)) { showMessage('❌ 请选择或填写正确的经纬度', 'error'); return; }

            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 提交中...';
            showMessage('⏳ 正在提交审核...', 'loading');
            showStatus('⏳ 正在提交...', 'loading');

            try {
                // 1. 上传例图到 ImgBB
                var examplePhotoUrl = null;
                if (document.getElementById('examplePhoto').files[0]) {
                    try {
                        showStatus('📤 正在上传例图到 ImgBB...', 'loading');
                        examplePhotoUrl = await uploadToImgBB(document.getElementById('examplePhoto').files[0]);
                        console.log('✅ 例图上传成功:', examplePhotoUrl);
                    } catch (uploadErr) {
                        console.warn('⚠️ 例图上传失败:', uploadErr);
                        showMessage('⚠️ 例图上传失败，但机位仍可提交：' + uploadErr.message, 'warning');
                    }
                }

                // 2. 插入到 Supabase
                var newSpot = {
                    name: name,
                    lng: lng,
                    lat: lat,
                    rank: rank,
                    description: description || '暂无描述',
                    example_photo: examplePhotoUrl,
                    photos: [],
                    created_by: user.username,
                    created_at: new Date().toISOString().slice(0, 10),
                    status: 'pending',
                    reviewed_by: null,
                    reviewed_at: null,
                    review_reason: null
                };

                var result = await supabaseClient
                    .from('spots')
                    .insert([newSpot]);

                if (result.error) throw new Error(result.error.message);

                showMessage('✅ 提交成功！等待管理员审核', 'success');
                showStatus('✅ 机位提交成功！', 'success');

                document.getElementById('uploadForm').reset();
                removeExamplePhoto();
                currentLng = 114.169;
                currentLat = 22.300;
                if (pickerMap) {
                    pickerMap.setCenter([currentLng, currentLat]);
                }
                updateCoords();

            } catch (error) {
                console.error('提交失败:', error);
                showMessage('❌ 提交失败：' + error.message, 'error');
                showStatus('❌ 提交失败：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 提交审核';
            }
        });

        // ============================================================
        //  启动
        // ============================================================
        renderNav();

        if (!getCurrentUser()) {
            showMessage('⚠️ 请先登录再上传机位', 'warning');
        }

        setTimeout(function() {
            initPickerMap();
        }, 300);

        document.getElementById('locateBtn').addEventListener('click', locateMe);

        console.log('📤 上传页面已加载（Supabase 版）');
    </script>
</body>
</html>
