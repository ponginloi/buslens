            <span class="tagline">· 巴士机位档案</span>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div class="user-area" id="userArea"></div>
    </nav>

    <!-- ===== 主体 ===== -->
    <div class="main-layout">

        <!-- 左侧：档案列表 -->
        <div class="archive-panel" id="archivePanel">
            <!-- 收起按钮 - 放在面板最上面 -->
            <div class="panel-toggle-area">
                <button class="toggle-btn" id="toggleBtn" onclick="togglePanel()" title="收起侧栏">
                    ◀
                </button>
            </div>

            <div class="archive-header">
                <div class="title">
                    📋 机位档案
                    <span class="count" id="totalCount">0</span>
                    <span class="view-count" id="viewCount"></span>
                </div>
                <div class="header-actions">
                    <button onclick="openFullscreen()" title="全屏查看">⛶</button>
                </div>
            </div>

            <!-- 筛选 -->
            <div class="filter-bar" id="filterBar">
                <span class="filter-label">🎯 等级：</span>
                <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all')">
                    <span class="dot all"></span>全部
                </button>
                <button class="filter-btn" data-filter="high" onclick="setFilter('high')">
                    <span class="dot high"></span>上等
                </button>
                <button class="filter-btn" data-filter="medium" onclick="setFilter('medium')">
                    <span class="dot medium"></span>中等
                </button>
                <button class="filter-btn" data-filter="low" onclick="setFilter('low')">
                    <span class="dot low"></span>下等
                </button>
            </div>

            <!-- 搜索 -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 搜索机位名称..." oninput="applySearch()">
            </div>

            <!-- 列表 -->
            <div class="spot-list" id="spotList">
                <div style="text-align:center;padding:40px 0;color:#999;">
                    <span class="spinner" style="display:inline-block;animation:spin 1s linear infinite;font-size:24px;">⟳</span>
                    <p style="margin-top:8px;">加载中...</p>
                </div>
            </div>
        </div>

        <!-- 浮动展开按钮 - 面板折叠时显示在地图左上角 -->
        <button class="float-toggle-btn" id="floatToggleBtn" onclick="togglePanel()" title="展开侧栏">
            ▶
        </button>

        <!-- 右侧：地图 -->
        <div class="map-panel">
            <div id="container">
                <div class="loading-tip" id="loadingTip">
                    <span class="spinner">⟳</span> 加载地图中...
                </div>
            </div>
            <div class="legend">
                <div class="title">⭐ 机位等级</div>
                <div class="legend-item"><span class="legend-dot high"></span> 上等 <span class="legend-count" id="countHigh">0</span></div>
                <div class="legend-item"><span class="legend-dot medium"></span> 中等 <span class="legend-count" id="countMedium">0</span></div>
                <div class="legend-item"><span class="legend-dot low"></span> 下等 <span class="legend-count" id="countLow">0</span></div>
            </div>
        </div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <script>
        // ============================================================
        //  Supabase 客户端
        // ============================================================
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }
        initSupabase();

        // ============================================================
        //  用户状态
        // ============================================================
        function getCurrentUser() {
            try {
                var raw = sessionStorage.getItem(SESSION_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.href = 'index.html';
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRankLabel(rank) {
            var map = { high: '上等 ⭐⭐⭐', medium: '中等 ⭐⭐', low: '下等 ⭐' };
            return map[rank] || rank;
        }

        function getRankColor(rank) {
            var map = { high: '#ff4444', medium: '#ffbb33', low: '#00c851' };
            return map[rank] || '#999';
        }

        function getDeviceLabel(device) {
            var map = { phone: '📱 手机', camera: '📷 相机', both: '📱📷 两者皆可' };
            return map[device] || '❓ 未指定';
        }

        function getDeviceIcon(device) {
            var map = { phone: '📱', camera: '📷', both: '📱📷' };
            return map[device] || '❓';
        }

        function showStatus(text, type) {
            var el = document.getElementById('statusMsg');
            el.textContent = text;
            el.className = 'status-msg show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(function() {
                el.className = 'status-msg';
            }, 3000);
        }

        function hideLoadingTip() {
            var tip = document.getElementById('loadingTip');
            if (tip) tip.style.display = 'none';
        }

        // ============================================================
        //  面板折叠/展开
        // ============================================================
        var panelCollapsed = false;

        function togglePanel() {
            panelCollapsed = !panelCollapsed;
            var panel = document.getElementById('archivePanel');
            var btn = document.getElementById('toggleBtn');
            var floatBtn = document.getElementById('floatToggleBtn');

            if (panelCollapsed) {
                // 折叠
                panel.classList.add('collapsed');
                btn.textContent = '▶';
                btn.style.background = '#1a73e8';
                btn.style.boxShadow = '0 2px 12px rgba(26,115,232,0.35)';
                // 显示浮动按钮
                floatBtn.classList.add('visible');
            } else {
                // 展开
                panel.classList.remove('collapsed');
                btn.textContent = '◀';
                btn.style.background = '#e94560';
                btn.style.boxShadow = '0 2px 12px rgba(233,69,96,0.35)';
                // 隐藏浮动按钮
                floatBtn.classList.remove('visible');
                // 恢复内容显示
                var children = panel.querySelectorAll('.archive-header, .filter-bar, .search-bar, .spot-list, .panel-toggle-area');
                children.forEach(function(el) {
                    el.style.display = '';
                });
            }

            if (map) {
                setTimeout(function() {
                    map.setFitView();
                }, 450);
            }
        }

        // ============================================================
        //  全屏查看（预留功能）
        // ============================================================
        function openFullscreen() {
            showStatus('📋 全屏查看功能开发中...', 'loading');
        }

        // ============================================================
        //  渲染导航
        // ============================================================
        function renderNav() {
            var nav = document.getElementById('navLinks');
            var userArea = document.getElementById('userArea');
            var user = getCurrentUser();

            if (user) {
                nav.innerHTML =
                    '<a href="index.html" class="active">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>' +
                    '<a href="profile.html">👤 个人中心</a>' +
                    '<a href="upload.html">📤 新机位</a>';
                userArea.innerHTML =
                    '<span class="user-name">👤 ' + escapeHtml(user.username) + '</span>' +
                    '<button class="btn-logout" onclick="logout()">退出</button>';
            } else {
                nav.innerHTML =
                    '<a href="index.html" class="active">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>';
                userArea.innerHTML =
                    '<a href="login.html">登录</a>' +
                    '<a href="register.html">注册</a>';
            }
        }

        // ============================================================
        //  高德地图加载
        // ============================================================
        var mapLoaded = false;
        var mapReadyCallbacks = [];

        function onMapReady(callback) {
            if (mapLoaded) {
                callback();
            } else {
                mapReadyCallbacks.push(callback);
            }
        }

        function loadAmap() {
            var amapKey = '404164dc78620cbc5d9440e9b2ed5e85';
            var amapSecurity = '32cb0dfc6330c69e2d13dd3164cea242';

            window._AMapSecurityConfig = {
                securityJsCode: amapSecurity
            };

            if (typeof AMap !== 'undefined') {
                mapLoaded = true;
                mapReadyCallbacks.forEach(function(cb) { cb(); });
                mapReadyCallbacks = [];
                return;
            }

            var script = document.createElement('script');
            script.src = 'https://webapi.amap.com/maps?v=2.0&key=' + amapKey;
            script.onload = function() {
                console.log('✅ 高德地图加载成功');
                mapLoaded = true;
                mapReadyCallbacks.forEach(function(cb) { cb(); });
                mapReadyCallbacks = [];
            };
            script.onerror = function() {
                console.error('❌ 高德地图加载失败');
            };
            document.head.appendChild(script);
        }

        // ============================================================
        //  全局状态
        // ============================================================
        var allSpots = [];
        var filteredSpots = [];
        var currentFilter = 'all';
        var searchQuery = '';
        var map = null;
        var markers = [];
        var selectedSpotId = null;
        var infoWindow = null;
        var mapMoveTimer = null;

        // ============================================================
        //  获取当前地图视野范围内的机位
        // ============================================================
        function getSpotsInView(spots) {
            if (!map || !spots || spots.length === 0) return [];

            var bounds = map.getBounds();
            if (!bounds) return spots;

            var sw = bounds.getSouthWest();
            var ne = bounds.getNorthEast();

            var lngMin = sw.getLng() - 0.015;
            var lngMax = ne.getLng() + 0.015;
            var latMin = sw.getLat() - 0.015;
            var latMax = ne.getLat() + 0.015;

            return spots.filter(function(spot) {
                return spot.lng >= lngMin && spot.lng <= lngMax &&
                    spot.lat >= latMin && spot.lat <= latMax;
            });
        }

        // ============================================================
        //  更新列表 - 只显示视野内机位
        // ============================================================
        function updateSpotListWithView(spots) {
            var container = document.getElementById('spotList');
            var totalCount = document.getElementById('totalCount');
            var viewCount = document.getElementById('viewCount');

            if (!spots || spots.length === 0) {
                container.innerHTML = '<div class="spot-card"><div class="card-empty">📭 没有匹配的机位</div></div>';
                totalCount.textContent = '0';
                viewCount.textContent = '';
                return;
            }

            var inViewSpots = getSpotsInView(spots);

            totalCount.textContent = spots.length;
            viewCount.textContent = '（显示 ' + inViewSpots.length + ' 个）';

            if (inViewSpots.length === 0) {
                container.innerHTML = '<div class="spot-card"><div class="card-empty">📍 当前地图视野内没有机位<br><span style="font-size:12px;color:#bbb;">拖动或缩放地图试试</span></div></div>';
                return;
            }

            var html = '';
            inViewSpots.forEach(function(spot) {
                var photos = spot.photos || [];
                var validPhotos = photos.filter(function(p) { return p.status !== 'rejected'; });
                var photoCount = validPhotos.length;
                if (spot.example_photo) photoCount += 1;

                var rankClass = spot.rank || 'medium';
                var rankLabel = getRankLabel(spot.rank);
                var deviceIcon = getDeviceIcon(spot.device_type);

                var isActive = (selectedSpotId == spot.id) ? 'active' : '';

                html +=
                    '<div class="spot-card ' + isActive + '" data-spot-id="' + spot.id + '" onclick="selectSpot(' +
                    spot.id +
                    ')">' +
                    '<span class="card-rank ' + rankClass + '">' + rankLabel + '</span>' +
                    '<div class="card-name">' + escapeHtml(spot.name) + '</div>' +
                    '<div class="card-meta">' +
                    '<span>📤 ' + escapeHtml(spot.created_by || '未知') + '</span>' +
                    '<span>📸 ' + photoCount + ' 张</span>' +
                    '<span>' + deviceIcon + '</span>' +
                    '</div>' +
                    '</div>';
            });

            container.innerHTML = html;
        }

        // ============================================================
        //  筛选与搜索
        // ============================================================
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(function(btn) {
                var f = btn.dataset.filter;
                btn.className = 'filter-btn';
                if (f === filter) {
                    btn.classList.add('active-' + filter);
                }
            });
            applyFilterAndSearch();
        }

        function applySearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilterAndSearch();
        }

        function applyFilterAndSearch() {
            var spots = allSpots.filter(function(s) {
                if (s.status !== 'approved') return false;
                if (currentFilter !== 'all' && s.rank !== currentFilter) return false;
                if (searchQuery && !s.name.toLowerCase().includes(searchQuery)) return false;
                return true;
            });
            filteredSpots = spots;
            updateSpotListWithView(spots);
            updateMapMarkers(spots);
        }

        // ============================================================
        //  地图视野变化监听
        // ============================================================
        function onMapMove() {
            if (mapMoveTimer) {
                clearTimeout(mapMoveTimer);
            }
            mapMoveTimer = setTimeout(function() {
                if (filteredSpots.length > 0) {
                    updateSpotListWithView(filteredSpots);
                }
                mapMoveTimer = null;
            }, 150);
        }

        // ============================================================
        //  选择机位
        // ============================================================
        function selectSpot(spotId) {
            selectedSpotId = spotId;
            var spot = allSpots.find(function(s) { return s.id == spotId && s.status === 'approved'; });
            if (!spot) return;

            document.querySelectorAll('.spot-card').forEach(function(el) {
                el.classList.toggle('active', el.dataset.spotId == spotId);
            });

            if (map) {
                map.setCenter([spot.lng, spot.lat]);
                map.setZoom(16);

                var targetMarker = null;
                markers.forEach(function(marker) {
                    var pos = marker.getPosition();
                    if (pos.getLng() === spot.lng && pos.getLat() === spot.lat) {
                        targetMarker = marker;
                    }
                });

                if (targetMarker) {
                    setTimeout(function() {
                        targetMarker.emit('click');
                    }, 350);
                }
            }
        }

        // ============================================================
        //  构建 InfoWindow - 只显示完整的 description
        // ============================================================
        function buildInfoContent(spot) {
            var color = getRankColor(spot.rank);

            var photos = spot.photos || [];
            var validPhotos = photos.filter(function(p) { return p.status !== 'rejected'; });
            var photoCount = validPhotos.length;
            if (spot.example_photo) photoCount += 1;

            var description = spot.description || '';

            var html = '';
            html += '<div class="spot-detail-wrap">';

            html += '<div class="spot-detail-name">' + escapeHtml(spot.name) + '</div>';
            html += '<span class="spot-detail-rank" style="background:' + color + ';">' + getRankLabel(spot.rank) + '</span>';

            html += '<div class="spot-detail-meta">';
            html += '<div><span class="label">📤 上传者：</span>' + escapeHtml(spot.created_by || '未知') + '</div>';
            html += '<div><span class="label">📍 位置：</span>' + spot.lng + ', ' + spot.lat + '</div>';
            html += '<div><span class="label">📱 设备：</span>' + getDeviceLabel(spot.device_type) + '</div>';
            html += '<div><span class="label">📸 照片：</span>' + photoCount + ' 张</div>';
            html += '</div>';

            if (description) {
                html += '<div class="spot-detail-desc">' + escapeHtml(description) + '</div>';
            }

            if (spot.example_photo) {
                html += '<div class="spot-detail-photo" onclick="window.open(\'' + escapeHtml(spot.example_photo) +
                    '\',\'_blank\')">';
                html += '<img src="' + escapeHtml(spot.example_photo) + '" alt="例图" loading="lazy" />';
                html += '</div>';
            }

            html += '<div class="spot-detail-links">';
            html += '<a href="index.html?spot_id=' + spot.id + '">📍 定位此机位</a>';
            html += '<span class="sep">|</span>';
            html += '<a href="profile.html?user=' + encodeURIComponent(spot.created_by || '') + '">👤 作者主页</a>';
            html += '</div>';

            html += '</div>';
            return html;
        }

        // ============================================================
        //  更新地图标记
        // ============================================================
        function updateMapMarkers(spots) {
            if (!map) return;

            if (infoWindow) {
                infoWindow.close();
                infoWindow = null;
            }

            markers.forEach(function(m) { map.remove(m); });
            markers = [];

            if (spots.length === 0) return;

            spots.forEach(function(spot) {
                var color = getRankColor(spot.rank);

                var markerContent = document.createElement('div');
                markerContent.style.cssText =
                    'width: 34px; height: 34px;' +
                    'background: ' + color + ';' +
                    'border-radius: 50%;' +
                    'border: 3px solid white;' +
                    'box-shadow: 0 2px 12px rgba(0,0,0,0.3);' +
                    'display: flex; align-items: center; justify-content: center;' +
                    'font-size: 15px; color: white; cursor: pointer;' +
                    'transition: transform 0.2s;';
                markerContent.textContent = '⭐';
                markerContent.onmouseenter = function() {
                    markerContent.style.transform = 'scale(1.2)';
                };
                markerContent.onmouseleave = function() {
                    markerContent.style.transform = 'scale(1)';
                };

                var marker = new AMap.Marker({
                    position: [spot.lng, spot.lat],
                    content: markerContent,
                    offset: new AMap.Pixel(-17, -17),
                    title: escapeHtml(spot.name),
                    zIndex: 100
                });

                var infoContent = buildInfoContent(spot);

                var markerInfoWindow = new AMap.InfoWindow({
                    content: infoContent,
                    offset: new AMap.Pixel(0, -38),
                    closeWhenClickMap: true,
                    autoMove: true
                });

                marker.on('click', function() {
                    if (infoWindow) {
                        infoWindow.close();
                    }
                    markerInfoWindow.open(map, marker.getPosition());
                    infoWindow = markerInfoWindow;

                    document.querySelectorAll('.spot-card').forEach(function(el) {
                        el.classList.toggle('active', el.dataset.spotId == spot.id);
                    });
                    selectedSpotId = spot.id;
                });

                map.add(marker);
                markers.push(marker);
            });

            if (selectedSpotId) {
                document.querySelectorAll('.spot-card').forEach(function(el) {
                    el.classList.toggle('active', el.dataset.spotId == selectedSpotId);
                });
            }
        }

        // ============================================================
        //  加载数据
        // ============================================================
        function loadData() {
            if (!supabaseClient) {
                console.error('❌ Supabase 未初始化');
                return;
            }

            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    allSpots = res.data || [];

                    var approved = allSpots.filter(function(s) { return s.status === 'approved'; });
                    var high = approved.filter(function(s) { return s.rank === 'high'; }).length;
                    var medium = approved.filter(function(s) { return s.rank === 'medium'; }).length;
                    var low = approved.filter(function(s) { return s.rank === 'low'; }).length;

                    document.getElementById('countHigh').textContent = high;
                    document.getElementById('countMedium').textContent = medium;
                    document.getElementById('countLow').textContent = low;

                    applyFilterAndSearch();

                    if (map) {
                        map.on('moveend', onMapMove);
                        map.on('zoomend', onMapMove);
                    }

                    var params = new URLSearchParams(window.location.search);
                    var spotId = params.get('spot_id');
                    if (spotId) {
                        setTimeout(function() {
                            selectSpot(parseInt(spotId));
                        }, 700);
                    }

                    console.log('✅ 加载完成，共 ' + approved.length + ' 个已审核机位');
                })
                .catch(function(error) {
                    console.error('❌ 加载数据失败:', error);
                    showStatus('❌ 读取数据失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  初始化地图
        // ============================================================
        function initMap() {
            console.log('🚀 初始化地图...');

            map = new AMap.Map('container', {
                zoom: 5,
                center: [104.0, 35.0],
                mapStyle: 'amap://styles/whitesmoke',
                viewMode: '2D',
                pitch: 0,
                showIndoorMap: false
            });

            AMap.plugin(['AMap.ToolBar', 'AMap.Scale'], function() {
                // 工具条放到右上角，避免和浮动按钮冲突
                map.addControl(new AMap.ToolBar({ position: 'RT' }));
                map.addControl(new AMap.Scale());
                console.log('✅ 地图控件已加载（右上角）');
            });

            map.on('complete', function() {
                console.log('✅ 地图加载完成！');
                hideLoadingTip();
                loadData();
            });

            map.on('error', function() {
                console.log('⚠️ 地图加载出错，尝试继续');
                hideLoadingTip();
                loadData();
            });
        }

        // ============================================================
        //  启动
        // ============================================================
        renderNav();
        loadAmap();

        onMapReady(function() {
            initMap();
        });

        console.log('🚌 BusLens 档案版已加载');
        console.log('✅ 收起按钮在面板顶部 | 浮动按钮只在折叠时显示');
    </script>
</body>
</html>
