            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 500;
            background: rgba(255, 255, 255, 0.9);
            padding: 18px 28px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            font-size: 15px;
            color: #666;
            pointer-events: none;
        }
        .loading-tip .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        .status-msg.show {
            display: block;
        }
        .status-msg.success {
            background: #28a745;
            color: white;
        }
        .status-msg.error {
            background: #dc3545;
            color: white;
        }
        .status-msg.loading {
            background: #1a73e8;
            color: white;
        }

        @media (max-width: 640px) {
            .navbar { padding: 8px 12px; }
            .navbar .brand { font-size: 17px; }
            .navbar .brand span { font-size: 22px; }
            .navbar .nav-links a { font-size: 12px; padding: 4px 8px; }
            .navbar .user-area .user-name { font-size: 12px; padding: 3px 6px; }
            .navbar .user-area a { font-size: 12px; padding: 4px 8px; }
            .navbar .github-badge { font-size: 10px; padding: 3px 8px; }
            .navbar .changelog-btn { font-size: 10px; padding: 3px 8px; }
            .admin-status { font-size: 10px; padding: 2px 8px; gap: 4px; }
            .admin-status .admin-item { font-size: 10px; }
            .btn-toggle-status { font-size: 11px; padding: 3px 8px; }
            .navbar .left-section { gap: 8px; }
            .navbar .right-section { gap: 4px; }
            .legend { top: 66px; right: 8px; padding: 8px 12px; font-size: 11px; min-width: 90px; }
            .legend-dot { width: 12px; height: 12px; }
            .spot-example-photo img { max-height: 100px; }
            .modal { padding: 18px; }
            .modal .photo-list .photo-item { width: 56px; height: 56px; }
            .status-msg { font-size: 12px; padding: 8px 14px; bottom: 12px; max-width: 92%; }
            .changelog-modal .modal-content { padding: 16px 18px; }
            .changelog-modal .modal-header h2 { font-size: 17px; }
            .changelog-modal .modal-body .update-content { font-size: 13px; }
        }

<body>

    <nav class="navbar">
        <div class="left-section">
            <a href="index.html" class="brand"><span>🚌</span> BusLens</a>
            <div class="nav-links" id="navLinks"></div>
        </div>
        <div class="right-section">
            <div class="admin-status" id="adminStatus"></div>
            <a href="https://github.com/ponginloi/buslens" target="_blank" class="github-badge">
                <span>⭐</span> GitHub 开源
                <span class="heart">❤️</span>
            </a>
            <button class="changelog-btn" onclick="openChangelog()">📋 更新日志</button>
            <div class="user-area" id="userArea"></div>

    </nav>

    <div class="legend">
        <div class="title">⭐ 机位等级</div>

        <div class="legend-item"><span class="legend-dot medium"></span> 中等 <span class="legend-count" id="countMedium">0</span></div>
        <div class="legend-item"><span class="legend-dot low"></span> 下等 <span class="legend-count" id="countLow">0</span></div>

        <div class="loading-tip" id="loadingTip">

    <div class="status-msg" id="statusMsg"></div>

    <!-- ===== 更新日志弹窗 ===== -->

        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 更新日志 <span class="badge-new">NEW</span></h2>

            <div class="modal-body" id="changelogBody">

    <!-- ===== 上传照片弹窗 ===== -->
    <div class="modal-overlay" id="photoModal">
        <div class="modal">
            <h3>📸 上传照片</h3>
            <div class="sub" id="modalSpotName">机位名称</div>

                    <input type="file" id="modalPhotoInput" accept="image/*" multiple>
                </div>
                <div class="photo-list" id="modalPhotoList"></div>
                <div style="font-size:12px;color:#999;margin-top:4px;">已选 <span id="modalPhotoCount">0</span> 张</div>

    </div>

    <script>
        // ============================================================
        //  高德地图动态加载（使用安全密钥）
        // ============================================================
        var mapLoaded = false;
        var mapReadyCallbacks = [];

        function onMapReady(callback) {
            if (mapLoaded) {
                callback();
            } else {
                mapReadyCallbacks.push(callback);
            }
        }

        async function loadAmap() {
            try {
                const amapKey = window.AMAP_KEY;
                const amapSecurity = window.AMAP_SECURITY;

                if (!amapKey) {
                    console.error('❌ 无法获取高德地图密钥');
                    return;
                }

                window._AMapSecurityConfig = {
                    securityJsCode: amapSecurity
                };

                if (typeof AMap !== 'undefined') {
                    mapLoaded = true;
                    mapReadyCallbacks.forEach(function(cb) { cb(); });
                    mapReadyCallbacks = [];
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://webapi.amap.com/maps?v=2.0&key=' + amapKey;
                script.onload = function() {
                    console.log('✅ 高德地图加载成功');
                    mapLoaded = true;
                    mapReadyCallbacks.forEach(function(cb) { cb(); });
                    mapReadyCallbacks = [];
                };
                script.onerror = function() {
                    console.error('❌ 高德地图加载失败');
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('❌ 加载地图失败:', error);
            }
        }

        // ============================================================
        //  用户状态
        // ============================================================
        function getCurrentUser() {
            try { var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function logout() {
            var user = getCurrentUser();
            if (user) {
                if (ADMIN_USERNAMES.indexOf(user.username) !== -1) {
                    supabaseClient
                        .from('users')
                        .update({ is_online: false })
                        .eq('id', user.id)
                        .then(function() {
                            sessionStorage.removeItem(SESSION_KEY);
                            location.reload();
                        })
                        .catch(function() {
                            sessionStorage.removeItem(SESSION_KEY);
                            location.reload();
                        });
                } else {
                    sessionStorage.removeItem(SESSION_KEY);
                    location.reload();
                }
            } else {
                sessionStorage.removeItem(SESSION_KEY);
                location.reload();
            }
        }

        function isAdmin() {
            var user = getCurrentUser();
            return user && ADMIN_USERNAMES.indexOf(user.username) !== -1;
        }

        // ============================================================
        //  导航栏
        // ============================================================
        function renderNav() {
            var nav = document.getElementById('navLinks');
            var userArea = document.getElementById('userArea');
            var user = getCurrentUser();

            if (user) {
                var admin = isAdmin();
                var pendingCount = window._pendingCount || 0;
                nav.innerHTML =
                    '<a href="index.html" class="active">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>' +
                    '<a href="profile.html">👤 个人中心</a>' +
                    (admin ? '<a href="admin.html">⚙️ 审核</a>' : '') +
                    (admin ? '<a href="admin_featured.html">📸 精选管理</a>' : '') +
                    (admin && pendingCount > 0 ? '<span class="pending-badge">📋 待审核 ' + pendingCount + '</span>' : '') +
                    '<a href="upload.html">📤 新机位</a>';
            } else {
                nav.innerHTML =
                    '<a href="index.html" class="active">🏠 地图</a>' +
                    '<a href="discover.html">🔍 发现</a>';
            }

            if (user) {
                var admin = isAdmin();
                userArea.innerHTML =
                    '<span class="user-name">👤 ' + (admin ? '管理员 ' : '') + escapeHtml(user.username) + (admin ? ' 🔑' : '') + '</span>' +
                    (admin ? '<button class="btn-toggle-status" id="statusToggleBtn" onclick="toggleOnlineStatus()">🟢 在线</button>' :
                        '') +
                    '<button class="btn-logout" onclick="logout()">退出</button>';

                if (admin) {
                    updateStatusButton();
                }
            } else {
                userArea.innerHTML =
                    '<a href="login.html">登录</a>' +
                    '<a href="register.html">注册</a>';
            }
        }

        function toggleOnlineStatus() {
            var user = getCurrentUser();
            if (!user || !isAdmin()) {
                alert('只有管理员可以操作');
                return;
            }

            supabaseClient
                .from('users')
                .select('is_online')
                .eq('id', user.id)
                .single()
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var currentStatus = res.data?.is_online || false;
                    var newStatus = !currentStatus;

                    return supabaseClient
                        .from('users')
                        .update({ is_online: newStatus, last_active: new Date().toISOString() })
                        .eq('id', user.id);
                })
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    showStatus('✅ 状态已切换', 'success');
                    updateStatusButton();
                    if (typeof getAdminStatus === 'function') {
                        getAdminStatus();
                    }
                })
                .catch(function(error) {
                    console.error('切换状态失败:', error);
                    showStatus('❌ 切换失败：' + error.message, 'error');
                });
        }

        function updateStatusButton() {
            var user = getCurrentUser();
            if (!user || !isAdmin()) return;

            var btn = document.getElementById('statusToggleBtn');
            if (!btn) return;

            supabaseClient
                .from('users')
                .select('is_online')
                .eq('id', user.id)
                .single()
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var isOnline = res.data?.is_online || false;
                    btn.textContent = isOnline ? '🟢 在线' : '🔴 离线';
                    btn.className = 'btn-toggle-status' + (isOnline ? '' : ' offline');
                })
                .catch(function(error) {
                    console.error('获取状态失败:', error);
                });
        }

        function getAdminStatus() {
            var now = new Date();
            var hour = now.getHours();

            supabaseClient
                .from('users')
                .select('username, is_online, last_active')
                .in('username', ['ponginloi', 'lnx'])
                .then(function(res) {
                    if (res.error) {
                        console.error('获取管理员状态失败:', res.error);
                        return;
                    }
                    var admins = res.data || [];
                    if (admins.length === 0) {
                        document.getElementById('adminStatus').innerHTML = '';
                        return;
                    }

                    var statusHtml = '';
                    admins.forEach(function(admin) {
                        var isOnline = admin.is_online === true;
                        var dotClass = isOnline ? 'online' : 'offline';
                        var statusText = '';

                        if (isOnline) {
                            statusText = '在线';
                        } else {
                            if (hour >= 22 || hour < 7) {
                                statusText = '补充睡眠中 😴';
                            } else {
                                statusText = '外出拍车中 📷';
                            }
                        }

                        statusHtml +=
                            '<span class="admin-item">' +
                            admin.username +
                            ' <span class="status-dot ' + dotClass + '"></span>' +
                            ' ' + statusText +
                            '</span>';
                    });

                    document.getElementById('adminStatus').innerHTML = statusHtml;
                });
        }

        // ============================================================
        //  工具函数
        // ============================================================
        function getRankLabel(rank) {
            var map = { high: '上等 ⭐⭐⭐', medium: '中等 ⭐⭐', low: '下等 ⭐' };
            return map[rank] || rank;
        }

        function getRankColor(rank) {
            var map = { high: '#ff4444', medium: '#ffbb33', low: '#00c851' };
            return map[rank] || '#999';
        }

        function getDeviceLabel(device) {
            var map = { phone: '📱 手机', camera: '📷 相机', both: '📱📷 两者皆可', unknown: '❓ 未指定' };
            return map[device] || '❓ 未指定';
        }

        function getUserTitle(spotCount, approvedCount, highRankCount, photoCount) {
            if (spotCount >= 150 && approvedCount >= 150 && highRankCount >= 35 && photoCount >= 100) {
                return { title: '⚡ 巴士之神', class: 'legend' };
            }
            if (spotCount >= 80 && approvedCount >= 80 && highRankCount >= 18 && photoCount >= 50) {
                return { title: '👑 巴士传奇', class: 'master' };
            }
            if (spotCount >= 40 && approvedCount >= 40 && highRankCount >= 8 && photoCount >= 25) {
                return { title: '📷 巴士摄影大师', class: 'photographer' };
            }
            if (spotCount >= 20 && approvedCount >= 20 && highRankCount >= 3 && photoCount >= 12) {
                return { title: '🔍 巴士探索家', class: 'explorer' };
            }
            if (spotCount >= 8 && approvedCount >= 8 && photoCount >= 5) {
                return { title: '📝 巴士记录者', class: 'recorder' };
            }
            return { title: '🌱 巴士萌新', class: 'beginner' };
        }

        function hideLoadingTip() {
            var tip = document.getElementById('loadingTip');
            if (tip) {
                tip.style.display = 'none';
            }
        }

        function showStatus(text, type) {
            var el = document.getElementById('statusMsg');
            el.textContent = text;
            el.className = 'status-msg show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(function() {
                el.className = 'status-msg';
            }, 4000);
        }

        // ============================================================
        //  📦 图片压缩 + 水印（与 upload.html 完全一致）
        // ============================================================
        function processImageWithCanvas(file, options, username) {
            var defaults = {
                maxWidth: 1920,
                maxHeight: 1080,
                quality: 0.85,
                maxSizeMB: 4.5,
                barHeight: 50,
                watermarkText: 'BusLens',
                copyrightText: '© 2026 ' + (username || '用户') + ' 版权所有'
            };
            var opt = Object.assign({}, defaults, options);

            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var width = img.width;
                        var height = img.height;

                        if (width > opt.maxWidth) {
                            height = height * opt.maxWidth / width;
                            width = opt.maxWidth;
                        }
                        if (height > opt.maxHeight) {
                            width = width * opt.maxHeight / height;
                            height = opt.maxHeight;
                        }

                        var finalWidth = Math.round(width);
                        var finalHeight = Math.round(height);
                        var barHeight = opt.barHeight;
                        var totalHeight = finalHeight + barHeight;

                        var canvas = document.createElement('canvas');
                        canvas.width = finalWidth;
                        canvas.height = totalHeight;
                        var ctx = canvas.getContext('2d');

                        ctx.drawImage(img, 0, 0, finalWidth, finalHeight);

                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, finalHeight, finalWidth, barHeight);

                        var fontSize = Math.max(11, Math.min(16, Math.round(finalWidth * 0.012)));
                        ctx.textBaseline = 'middle';
                        ctx.textAlign = 'left';
                        ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillText(opt.watermarkText, 14, finalHeight + barHeight / 2 + 1);

                        ctx.textAlign = 'right';
                        ctx.font = fontSize + 'px Arial, sans-serif';
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillText(opt.copyrightText, finalWidth - 14, finalHeight + barHeight / 2 + 1);

                        var watermarkFontSize = Math.max(40, Math.min(90, Math.round(finalWidth * 0.048)));
                        ctx.save();
                        ctx.globalAlpha = 0.75;
                        ctx.font = 'bold ' + watermarkFontSize + 'px Arial, sans-serif';
                        ctx.textBaseline = 'bottom';
                        ctx.textAlign = 'left';
                        ctx.fillStyle = '#FFFFFF';
                        var padding = Math.max(16, Math.round(finalWidth * 0.02));
                        ctx.fillText(opt.watermarkText, padding, finalHeight - padding);
                        ctx.restore();

                        var quality = opt.quality;
                        var needCompress = file.size > opt.maxSizeMB * 1024 * 1024;

                        function tryExport() {
                            canvas.toBlob(function(blob) {
                                if (needCompress && blob.size > opt.maxSizeMB * 1024 * 1024 && quality > 0.1) {
                                    quality -= 0.05;
                                    tryExport();
                                    return;
                                }
                                var processedFile = new File([blob], file.name, { type: 'image/jpeg' });
                                console.log('✅ 处理完成：' +
                                    (file.size / 1024 / 1024).toFixed(2) + 'MB → ' +
                                    (blob.size / 1024 / 1024).toFixed(2) + 'MB'
                                );
                                resolve(processedFile);
                            }, 'image/jpeg', quality);
                        }
                        tryExport();
                    };
                    img.onerror = function() {
                        reject(new Error('图片加载失败'));
                    };
                    img.src = e.target.result;
                };
                reader.onerror = function() {
                    reject(new Error('文件读取失败'));
                };
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        //  上传照片弹窗
        // ============================================================
        var currentSpotId = null;
        var currentSpotName = '';
        var selectedPhotoFiles = [];

        function openPhotoModal(spotId, spotName) {
            var user = getCurrentUser();
            if (!user) {
                alert('请先登录才能上传照片！');
                window.location.href = 'login.html';
                return;
            }
            currentSpotId = spotId;
            currentSpotName = spotName;
            selectedPhotoFiles = [];
            document.getElementById('modalSpotName').textContent = '📍 ' + escapeHtml(spotName);
            document.getElementById('photoCaption').value = '';
            document.getElementById('modalPhotoInput').value = '';
            document.getElementById('modalPhotoList').innerHTML = '';
            document.getElementById('modalPhotoCount').textContent = '0';
            document.getElementById('modalMsg').className = 'modal-msg';
            document.getElementById('modalMsg').style.display = 'none';
            document.getElementById('photoSubmitBtn').disabled = false;
            document.getElementById('photoSubmitBtn').textContent = '📤 上传';
            document.getElementById('photoModal').classList.add('active');
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('active');
        }

        function showModalMsg(text, type) {
            var el = document.getElementById('modalMsg');
            el.textContent = text;
            el.className = 'modal-msg ' + type;
            el.style.display = 'block';
        }

        document.getElementById('modalPhotoInput').addEventListener('change', function(e) {
            var files = e.target.files;
            for (var i = 0; i < files.length; i++) {
                if (files[i].size > 10 * 1024 * 1024) {
                    alert('照片 ' + files[i].name + ' 超过 10MB，已跳过');
                    continue;
                }
                selectedPhotoFiles.push(files[i]);
            }
            renderModalPhotoList();
            this.value = '';
        });

        function renderModalPhotoList() {
            var container = document.getElementById('modalPhotoList');
            document.getElementById('modalPhotoCount').textContent = selectedPhotoFiles.length;
            if (selectedPhotoFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            var html = '';
            selectedPhotoFiles.forEach(function(file, index) {
                var url = URL.createObjectURL(file);
                html +=
                    '<div class="photo-item">' +
                    '<img src="' + url + '" alt="' + file.name + '" />' +
                    '<button class="remove-photo" onclick="removeModalPhoto(' + index + ')">×</button>' +
                    '</div>';
            });
            container.innerHTML = html;
        }

        function removeModalPhoto(index) {
            selectedPhotoFiles.splice(index, 1);
            renderModalPhotoList();
        }

        // ============================================================
        //  📤 提交照片（压缩 + 水印 + 安全上传）
        // ============================================================
        async function submitPhotos() {
            var user = getCurrentUser();
            if (!user) { alert('请先登录'); return; }

            if (selectedPhotoFiles.length === 0) {
                showModalMsg('❌ 请至少选择一张照片', 'error');
                return;
            }

            var caption = document.getElementById('photoCaption').value.trim();

            var btn = document.getElementById('photoSubmitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 压缩上传中...';
            showModalMsg('⏳ 正在压缩并上传照片...', 'loading');
            showStatus('📦 正在压缩图片...', 'loading');

            var uploadPromises = selectedPhotoFiles.map(async function(file) {
                try {
                    if (file.size > 1024 * 1024) {
                        var processed = await processImageWithCanvas(file, {
                            maxWidth: 1920,
                            maxHeight: 1080,
                            quality: 0.85,
                            maxSizeMB: 4.5,
                            barHeight: 50,
                            watermarkText: 'BusLens',
                            copyrightText: '© 2026 ' + user.username + ' 版权所有'
                        }, user.username);
                        // ✅ 使用 api.js 中的 uploadToImgBB
                        return await uploadToImgBB(processed);
                    } else {
                        var processed = await processImageWithCanvas(file, {
                            maxWidth: 1920,
                            maxHeight: 1080,
                            quality: 0.85,
                            maxSizeMB: 4.5,
                            barHeight: 50,
                            watermarkText: 'BusLens',
                            copyrightText: '© 2026 ' + user.username + ' 版权所有'
                        }, user.username);
                        return await uploadToImgBB(processed);
                    }
                } catch (error) {
                    console.warn('⚠️ 处理失败，使用原图:', error);
                    return await uploadToImgBB(file);
                }
            });

            try {
                var imageUrls = await Promise.all(uploadPromises);

                showModalMsg('✅ 上传完成，正在保存...', 'loading');
                showStatus('📝 正在保存到数据库...', 'loading');

                var result = await supabaseClient
                    .from('spots')
                    .select('photos')
                    .eq('id', currentSpotId)
                    .single();

                if (result.error) throw new Error(result.error.message);
                var spot = result.data;
                if (!spot) throw new Error('机位不存在');

                var photos = spot.photos || [];
                imageUrls.forEach(function(url, index) {
                    photos.push({
                        id: 'photo_' + Date.now() + '_' + index,
                        url: url,
                        caption: caption || '',
                        uploader: user.username,
                        uploaderName: user.username,
                        date: new Date().toISOString().slice(0, 10),
                        status: 'pending'
                    });
                });

                await supabaseClient
                    .from('spots')
                    .update({ photos: photos })
                    .eq('id', currentSpotId);

                showModalMsg('✅ ' + selectedPhotoFiles.length + ' 张照片已保存！等待审核', 'success');
                showStatus('✅ 照片保存成功！', 'success');
                btn.textContent = '✅ 已上传';
                setTimeout(function() {
                    closePhotoModal();
                    loadMapData();
                }, 1500);

            } catch (error) {
                console.error('上传失败:', error);
                showModalMsg('❌ 上传失败：' + error.message, 'error');
                showStatus('❌ 上传失败：' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '📤 重新上传';
            }
        }

        function toggleFavorite(spotId, btn) {
            var user = getCurrentUser();
            if (!user) {
                alert('请先登录才能收藏！');
                window.location.href = 'login.html';
                return;
            }

            supabaseClient
                .from('favorites')
                .select('*')
                .eq('user_id', user.id)
                .eq('spot_id', spotId)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    if (res.data && res.data.length > 0) {
                        return supabaseClient
                            .from('favorites')
                            .delete()
                            .eq('user_id', user.id)
                            .eq('spot_id', spotId);
                    } else {
                        return supabaseClient
                            .from('favorites')
                            .insert([{ user_id: user.id, spot_id: spotId }]);
                    }
                })
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    updateFavoriteButton(spotId, btn);
                    showStatus('✅ 收藏已更新', 'success');
                })
                .catch(function(error) {
                    console.error('收藏操作失败:', error);
                    showStatus('❌ 操作失败：' + error.message, 'error');

        function updateFavoriteButton(spotId, btn) {

        // ============================================================
        //  📍 定位
        // ============================================================
        function getSpotIdFromURL() {
            var params = new URLSearchParams(window.location.search);
            return params.get('spot_id');
        }

        function locateSpot(spotId) {
            if (!spotId || !map) return;

            var allSpots = allSpotsCache || [];
            var spot = allSpots.find(function(s) {
                return s.id == spotId && s.status === 'approved';
            });

            if (!spot) {
                console.log('⚠️ 找不到机位 ID:', spotId);
                showStatus('⚠️ 该机位不存在或未审核通过', 'error');
                return;
            }

            map.setCenter([spot.lng, spot.lat]);
            map.setZoom(15);

            setTimeout(function() {
                var markers = map.getAllOverlays('marker');
                for (var i = 0; i < markers.length; i++) {
                    var marker = markers[i];
                    var pos = marker.getPosition();
                    if (pos.getLng() === spot.lng && pos.getLat() === spot.lat) {
                        marker.emit('click');
                        console.log('✅ 已定位到机位:', spot.name);
                        break;
                    }
                }
            }, 500);
        }

        // ============================================================
        //  🖼️ 弹窗图片懒加载
        // ============================================================
        function loadImageForSpot(spotId, imgElement, url) {
            if (!imgElement) return;
            if (imgElement.dataset && imgElement.dataset.loaded === 'true') return;

            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                var newImg = document.createElement('img');
                newImg.src = url;
                newImg.alt = '';
                newImg.style.width = '100%';
                newImg.style.maxHeight = '160px';
                newImg.style.objectFit = 'cover';
                newImg.style.display = 'block';
                newImg.style.cursor = 'pointer';
                newImg.onclick = function(e) {
                    e.stopPropagation();
                    window.open(url, '_blank');
                };
                imgElement.parentNode.replaceChild(newImg, imgElement);
                if (imgElement.dataset) imgElement.dataset.loaded = 'true';
            };
            img.onerror = function() {
                imgElement.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">❌ 加载失败</div>';
                if (imgElement.dataset) imgElement.dataset.loaded = 'true';
            };
            img.src = url;
        }

        function loadSpotImages(spotId) {
            var container = document.getElementById('spot_images_' + spotId);
            if (!container) return;
            if (container.dataset.loaded === 'true') return;
            container.dataset.loaded = 'true';

            var spot = allSpotsCache.find(function(s) { return s.id == spotId; });
            if (!spot) return;

            var exampleContainer = container.querySelector('.example-container');
            if (exampleContainer && spot.example_photo) {
                var placeholder = exampleContainer.querySelector('.loading-placeholder');
                if (placeholder) {
                    loadImageForSpot(spotId, placeholder, spot.example_photo);
                }
            }

            var photoItems = container.querySelectorAll('.photo-item');
            if (photoItems.length > 0 && spot.photos) {
                var validPhotos = spot.photos.filter(function(p) { return p.status !== 'rejected'; });
                photoItems.forEach(function(item, index) {
                    if (index < validPhotos.length) {
                        var p = validPhotos[index];
                        var placeholder = item.querySelector('.photo-placeholder');
                        if (placeholder) {
                            var img = new Image();
                            img.crossOrigin = 'anonymous';
                            img.onload = function() {
                                var newImg = document.createElement('img');
                                newImg.src = p.url;
                                newImg.alt = p.caption || '';
                                newImg.style.width = '72px';
                                newImg.style.height = '54px';
                                newImg.style.objectFit = 'cover';
                                newImg.style.borderRadius = '6px';
                                newImg.style.cursor = 'pointer';
                                newImg.style.border = '1px solid #eee';
                                newImg.onclick = function(e) {
                                    e.stopPropagation();
                                    window.open(p.url, '_blank');
                                };
                                placeholder.parentNode.replaceChild(newImg, placeholder);
                            };
                            img.onerror = function() {
                                placeholder.textContent = '❌';
                                placeholder.style.fontSize = '20px';
                                placeholder.style.display = 'flex';
                                placeholder.style.alignItems = 'center';
                                placeholder.style.justifyContent = 'center';
                            };
                            img.src = p.url;
                        }
                    }
                });
            }
        }

        var map = null;

        function initSupabaseMain() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');

            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                return true;
            } catch (e) {
                console.error('❌ Supabase 主客户端初始化失败:', e);

        function loadMapData() {
            console.log('🔄 开始加载机位数据...');

                console.error('❌ Supabase 未初始化');

                return;
            }

            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    allSpotsCache = res.data || [];
                    var allSpots = allSpotsCache;
                    console.log('📦 从数据库读取到', allSpots.length, '个机位');

                    var spots = allSpots.filter(function(s) {
                        return s.status === 'approved';
                    });

                    console.log('📍 已审核机位:', spots.length, '个');

                    var pending = allSpots.filter(function(s) { return s.status === 'pending'; });
                    window._pendingCount = pending.length;
                    renderNav();

                    var totalSpotsEl = document.getElementById('totalSpots');
                    if (totalSpotsEl) totalSpotsEl.textContent = spots.length;

                    var photoCount = 0;
                    spots.forEach(function(s) {
                        if (s.photos) {
                            var validPhotos = s.photos.filter(function(p) {
                                return p.status !== 'rejected';
                            });
                            photoCount += validPhotos.length;
                        }
                    });
                    var totalPhotosEl = document.getElementById('totalPhotos');
                    if (totalPhotosEl) totalPhotosEl.textContent = photoCount;

                    var high = 0, medium = 0, low = 0;
                    spots.forEach(function(s) {
                        if (s.rank === 'high') high++;
                        else if (s.rank === 'medium') medium++;
                        else if (s.rank === 'low') low++;
                    });
                    document.getElementById('countHigh').textContent = high;
                    document.getElementById('countMedium').textContent = medium;
                    document.getElementById('countLow').textContent = low;

                    if (map) {
                        map.clearMap();
                    }

                    if (spots.length === 0) {
                        console.log('⚠️ 没有已审核通过的机位');
                        return;
                    }

                    spots.forEach(function(spot, index) {
                        var color = getRankColor(spot.rank);

                            'width: 36px; height: 36px;' +
                            'background: ' + color + ';' +

                            'border: 3px solid white;' +
                            'box-shadow: 0 2px 12px rgba(0,0,0,0.3);' +
                            'display: flex; align-items: center; justify-content: center;' +
                            'font-size: 16px; color: white; cursor: pointer;' +
                            'transition: transform 0.2s;';

                        markerContent.onmouseenter = function() {
                            markerContent.style.transform = 'scale(1.2)';
                        };
                        markerContent.onmouseleave = function() {
                            markerContent.style.transform = 'scale(1)';
                        };

                        var marker = new AMap.Marker({
                            position: [spot.lng, spot.lat],
                            content: markerContent,
                            offset: new AMap.Pixel(-18, -18),
                            title: escapeHtml(spot.name),
                            zIndex: 100
                        });

                        var deviceLabel = getDeviceLabel(spot.device_type);

                        var exampleHtml = '';
                        if (spot.example_photo) {
                            exampleHtml =
                                '<div class="spot-example-photo example-container">' +
                                '<div class="loading-placeholder">📷 点击加载例图</div>' +
                                '</div>';
                        } else {
                            exampleHtml =
                                '<div class="spot-example-photo">' +
                                '<div class="no-photo">📷 暂无例图</div>' +
                                '</div>';

                        var photosHtml = '<div class="label">📸 暂无用户照片</div>';
                        if (spot.photos && spot.photos.length > 0) {
                            var validPhotos = spot.photos.filter(function(p) {
                                return p.status !== 'rejected';
                            });
                            if (validPhotos.length > 0) {
                                var photoItemsHtml = validPhotos.map(function(p) {
                                    var uploaderName = p.uploader || p.uploaderName || '未知';
                                    return '<div class="photo-item">' +
                                        '<div class="photo-placeholder">📷</div>' +
                                        '<div class="photo-uploader">📤 <a href="profile.html?user=' + encodeURIComponent(uploaderName) + '" onclick="event.stopPropagation();">' + escapeHtml(uploaderName) + '</a></div>' +
                                        '</div>';
                                }).join('');
                                photosHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">' + photoItemsHtml + '</div>';
                            }
                        }

                        var userSpots = allSpots.filter(function(s) {
                            return s.created_by === spot.created_by && s.status === 'approved';
                        });
                        var userPhotos = 0;
                        userSpots.forEach(function(s) {
                            if (s.photos) {
                                s.photos.forEach(function(p) {
                                    if (p.status !== 'rejected') userPhotos++;
                                });
                            }
                        });
                        var userHighRank = userSpots.filter(function(s) { return s.rank === 'high'; }).length;
                        var titleInfo = getUserTitle(userSpots.length, userSpots.length, userHighRank, userPhotos);

                        var infoContent =
                            '<div style="padding:4px 2px;max-width:320px;">' +
                            '<div class="spot-name">' + escapeHtml(spot.name) + '</div>' +
                            '<span class="spot-rank ' + spot.rank + '">' + getRankLabel(spot.rank) + '</span>' +
                            '<div style="font-size:13px;color:#888;margin:4px 0;">📱 ' + deviceLabel + '</div>' +
                            '<div class="spot-desc">' + escapeHtml(spot.description || '暂无描述') + '</div>' +
                            '<div id="spot_images_' + spot.id + '" data-loaded="false">' +
                            exampleHtml +
                            '<div class="spot-photos">' +
                            photosHtml +
                            '<div style="margin-top:6px;font-size:12px;color:#999;">' +
                            '📤 上传者：<a href="profile.html?user=' + encodeURIComponent(spot.created_by || '') +
                            '" style="color:#1a73e8;text-decoration:none;font-weight:500;" onclick="event.stopPropagation();">' +
                            escapeHtml(spot.created_by || '未知') + '</a>' +
                            '<span class="uploader-title"><span class="title-icon">' + titleInfo.title +
                            '</span></span>' +
                            ' ｜ ' + escapeHtml(spot.created_at || '') +
                            '</div>' +
                            '<div style="margin-top:8px;">' +
                            '<button class="btn-favorite" onclick="toggleFavorite(\'' + spot.id + '\', this)" data-spot-id="' +
                            spot.id + '">' +
                            '⭐ 收藏</button>' +
                            '</div>' +
                            '<div class="spot-actions">' +
                            '<button class="btn-upload-photo" onclick="openPhotoModal(\'' + spot.id + '\',\'' + escapeHtml(spot.name) +
                            '\')">📸 上传照片</button>' +
                            '<a href="upload.html" class="btn-new-spot">➕ 新机位</a>' +
                            '</div>' +
                            '</div>' +
                            '</div>' +
                            '</div>';

                        var infoWindow = new AMap.InfoWindow({
                            content: infoContent,
                            offset: new AMap.Pixel(0, -40),
                            closeWhenClickMap: true
                        });

                        marker.on('click', function() {
                            infoWindow.open(map, marker.getPosition());
                            setTimeout(function() {
                                loadSpotImages(spot.id);
                            }, 150);
                        });

                        map.add(marker);
                    });

                    var user = getCurrentUser();
                    if (user) {
                        supabaseClient
                            .from('favorites')
                            .select('spot_id')
                            .eq('user_id', user.id)
                            .then(function(res) {
                                if (res.error) throw new Error(res.error.message);
                                var favoriteIds = (res.data || []).map(function(f) { return f.spot_id; });
                                document.querySelectorAll('.btn-favorite').forEach(function(btn) {
                                    var spotId = btn.getAttribute('data-spot-id');
                                    if (favoriteIds.indexOf(Number(spotId)) !== -1) {
                                        btn.textContent = '⭐ 已收藏 ❤️';
                                        btn.className = 'btn-favorite favorited';
                                    }
                                });
                            })
                            .catch(function(error) {
                                console.error('加载收藏状态失败:', error);
                            });
                    }

                    setTimeout(function() {
                        if (spots.length > 0 && map) {
                            map.setFitView();
                            console.log('✅ 已调整视野到所有机位');

                    var targetSpotId = getSpotIdFromURL();
                    if (targetSpotId) {
                        setTimeout(function() {
                            locateSpot(targetSpotId);
                        }, 800);
                    }

                    console.log('✅ 数据加载成功，共 ' + spots.length + ' 个已审核机位（图片点击后加载，上传带水印，XSS防护）');
                })
                .catch(function(error) {
                    console.error('❌ 加载数据失败:', error);
                    showStatus('❌ 读取数据失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  📋 更新日志功能
        // ============================================================
        var currentEditId = null;

        function openChangelog() {
            document.getElementById('changelogModal').classList.add('active');
            loadChangelog();
            document.body.style.overflow = 'hidden';
        }

        function closeChangelog() {
            document.getElementById('changelogModal').classList.remove('active');
            document.body.style.overflow = '';
            cancelEdit();
        }

        function loadChangelog() {
            var body = document.getElementById('changelogBody');
            body.innerHTML =
                '<div style="text-align:center;padding:40px 0;color:#999;"><span class="spinner" style="display:inline-block;animation:spin 1s linear infinite;font-size:24px;">⟳</span><p style="margin-top:8px;">加载中...</p></div>';

            supabaseClient
                .from('updates')
                .select('*')
                .order('id', { ascending: false })
                .limit(1)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var data = res.data;
                    if (!data || data.length === 0) {
                        body.innerHTML =
                            '<div style="text-align:center;padding:40px 0;color:#999;"><p>暂无更新日志</p></div>';
                        document.getElementById('changelogTimestamp').textContent = '暂无更新';
                        return;
                    }
                    var update = data[0];
                    currentEditId = update.id;
                    document.getElementById('changelogTimestamp').textContent = '最后更新：' + formatDate(update.updated_at);

                    var contentHtml = update.content || '暂无内容';
                    contentHtml = contentHtml
                        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/^\- (.*$)/gim, '<li>$1</li>')
                        .replace(/(<li>.*?<\/li>)/g, '<ul>$1</ul>')
                        .replace(/<\/ul><ul>/g, '');

                    body.innerHTML =
                        '<div class="update-content">' + contentHtml + '</div>';

                    document.getElementById('editContent').value = update.content || '';

                    var user = getCurrentUser();
                    var editBtn = document.getElementById('editBtn');
                    var editHint = document.getElementById('editHint');
                    if (user && isAdmin()) {
                        editBtn.classList.remove('hidden');
                        editHint.textContent = '💡 支持 Markdown 语法（标题 #, ##, ### / 列表 - / 粗体 **）';
                    } else {
                        editBtn.classList.add('hidden');
                        editHint.textContent = '💡 只有管理员可以编辑';
                    }
                })
                .catch(function(error) {
                    console.error('加载更新日志失败:', error);
                    body.innerHTML = '<div style="text-align:center;padding:40px 0;color:#f44336;"><p>❌ 加载失败</p></div>';
                });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            var d = new Date(dateStr);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2,
                '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }

        function enableEdit() {
            document.getElementById('editArea').classList.add('active');
            document.getElementById('editBtn').style.display = 'none';
        }

        function cancelEdit() {
            document.getElementById('editArea').classList.remove('active');
            document.getElementById('editBtn').style.display = '';
        }

        function saveChangelog() {
            var content = document.getElementById('editContent').value.trim();
            if (!content) {
                alert('内容不能为空');
                return;
            }

            var user = getCurrentUser();
            if (!user) {
                alert('请先登录');
                return;
            }
            if (!isAdmin()) {
                alert('只有管理员可以编辑');
                return;
            }

            var btn = document.querySelector('.btn-save');
            btn.disabled = true;
            btn.textContent = '⏳ 保存中...';

            var data = {
                content: content,
                updated_by: user.username,
                updated_at: new Date().toISOString()
            };

            var promise;
            if (currentEditId) {
                promise = supabaseClient
                    .from('updates')
                    .update(data)
                    .eq('id', currentEditId);
            } else {
                promise = supabaseClient
                    .from('updates')
                    .insert([data]);
            }

            promise.then(function(res) {
                if (res.error) throw new Error(res.error.message);
                showStatus('✅ 更新日志已保存！', 'success');
                cancelEdit();
                loadChangelog();
                btn.disabled = false;
                btn.textContent = '💾 保存';
            }).catch(function(error) {
                console.error('保存失败:', error);
                alert('保存失败：' + error.message);
                btn.disabled = false;
                btn.textContent = '💾 保存';
            });
        }

        document.getElementById('changelogModal').addEventListener('click', function(e) {
            if (e.target === this) closeChangelog();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('changelogModal').classList.contains('active')) closeChangelog();
                if (document.getElementById('photoModal').classList.contains('active')) closePhotoModal();
            }
        });

        // ============================================================
        //  初始化地图
        // ============================================================
        function initMap() {
            console.log('🚀 开始初始化地图...');

            map = new AMap.Map('container', {
                zoom: 5,
                center: [104.0, 35.0],
                mapStyle: 'amap://styles/whitesmoke',
                viewMode: '3D',
                pitch: 0,
                showIndoorMap: false
            });

            console.log('✅ 地图对象已创建');

            AMap.plugin(['AMap.ToolBar', 'AMap.Scale'], function() {
                map.addControl(new AMap.ToolBar({ position: 'LT' }));
                map.addControl(new AMap.Scale());
                console.log('✅ 地图控件已加载');
            });

            map.on('complete', function() {
                console.log('✅ 地图加载完成！');
                hideLoadingTip();
                loadMapData();
                setTimeout(function() {
                    getAdminStatus();
                }, 1000);
            });

            map.on('error', function() {
                console.log('⚠️ 地图加载出错，尝试继续');
                hideLoadingTip();
                loadMapData();
            });
        }

        // ============================================================
        //  启动
        // ============================================================
        initSupabaseMain();
        renderNav();
        loadAmap();

        onMapReady(function() {
            initMap();
        });

        setInterval(getAdminStatus, 30000);
