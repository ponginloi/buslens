<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - BusLens</title>
    <script src="config.js"></script>

    <script>
        var SESSION_KEY = 'bus_user_session';
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') return false;
            if (!window.SUPABASE_URL || !window.SUPABASE_KEY) return false;
            try {
                supabaseClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
                return true;
            } catch (e) {
                console.error('Supabase 初始化失败:', e);
                return false;
            }
        }

        document.addEventListener('configLoaded', function() {
            initSupabase();
            document.getElementById('registerForm').addEventListener('submit', registerHandler);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // ============================================================
        //  🛡️ 防止 XSS 攻击
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f2f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(26, 115, 232, 0.15);
        }
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .register-header .logo {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }
        .register-header h1 {
            font-size: 24px;
            color: #1a73e8;
        }
        .register-header p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        .form-group label .required {
            color: #ff4444;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1a73e8;
        }
        .form-group .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .register-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .register-footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: none;
        }
        .message.error {
            display: block;
            background: #fee8e8;
            color: #d32f2f;
        }
        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .message.loading {
            display: block;
            background: #e8f0fe;
            color: #1a73e8;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #999;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover {
            color: #1a73e8;
        }

        .welcome-box {
            background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
            border-left: 4px solid #1a73e8;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
            line-height: 1.8;
            text-align: center;
        }
        .welcome-box .highlight {
            font-weight: 600;
            color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <span class="logo">🚌</span>
            <h1>加入我们</h1>
            <p>注册后可以上传机位和照片</p>
        </div>

        <!-- ===== 欢迎语 ===== -->
        <div class="welcome-box">
            <p>📸 每一张照片，都是你独一无二的视角。</p>
            <p>记录巴士的瞬间，分享城市的故事。</p>
            <p>无论你是初来乍到，还是相伴已久，</p>
            <p>BusLens 都因你的每一次快门而更精彩。</p>
            <p style="margin-top:6px;font-weight:600;color:#1a73e8;font-size:15px;">期待你的下一张好图！🚌✨</p>
        </div>

        <div class="message" id="message"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>👤 用户名 <span class="required">*</span></label>
                <input type="text" id="username" placeholder="请设置用户名（4-20个字符）" required minlength="4" maxlength="20">
                <div class="hint">只支持英文、数字和下划线</div>
            </div>
            <div class="form-group">
                <label>📧 邮箱 <span class="required">*</span></label>
                <input type="email" id="email" placeholder="请输入邮箱地址" required>
            </div>
            <div class="form-group">
                <label>🔒 密码 <span class="required">*</span></label>
                <input type="password" id="password" placeholder="请设置密码（至少6位）" required minlength="6">
                <div class="hint">密码至少6位，建议包含字母和数字</div>
            </div>
            <div class="form-group">
                <label>🔒 确认密码 <span class="required">*</span></label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">注 册</button>
        </form>
        <div class="register-footer">已有账号？<a href="login.html">立即登录</a></div>
        <a href="index.html" class="back-link">← 返回首页浏览机位</a>
    </div>

    <script>
        // ============================================================
        //  注册逻辑
        // ============================================================
        var supabaseClient = null;
        var SESSION_KEY = 'bus_user_session';

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            if (!window.SUPABASE_URL || !window.SUPABASE_KEY) {
                console.error('❌ 配置未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }

        function showMessage(text, type) {
            var el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        async function registerHandler(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var btn = document.getElementById('registerBtn');

            if (!/^[a-zA-Z0-9_]{4,20}$/.test(username)) {
                showMessage('❌ 用户名只能包含英文、数字、下划线，且4-20个字符', 'error');
                return;
            }
            if (!email || !email.includes('@')) {
                showMessage('❌ 请填写有效的邮箱地址', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('❌ 密码至少6位', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('❌ 两次密码不一致', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ 注册中...';
            showMessage('⏳ 提交中...', 'loading');

            try {
                var checkResult = await supabaseClient
                    .from('users')
                    .select('username')
                    .eq('username', username);

                if (checkResult.error) throw new Error(checkResult.error.message);
                if (checkResult.data && checkResult.data.length > 0) {
                    showMessage('❌ 用户名已被注册', 'error');
                    btn.disabled = false;
                    btn.textContent = '注 册';
                    return;
                }

                var newUser = {
                    username: username,
                    email: email,
                    password: password,
                    role: 'user',
                    created_at: new Date().toISOString().slice(0, 10)
                };

                var insertResult = await supabaseClient
                    .from('users')
                    .insert([newUser]);

                if (insertResult.error) throw new Error(insertResult.error.message);

                var session = {
                    id: insertResult.data ? insertResult.data[0].id : 'user_' + Date.now(),
                    username: username,
                    email: email,
                    role: 'user',
                    loginTime: Date.now()
                };
                sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));

                showMessage('✅ 注册成功！正在跳转...', 'success');
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 800);

            } catch (error) {
                console.error('注册失败:', error);
                showMessage('❌ 注册失败：' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        }

        if (sessionStorage.getItem(SESSION_KEY)) {
            window.location.href = 'index.html';
        }

        document.addEventListener('configLoaded', function() {
            initSupabase();
            document.getElementById('registerForm').addEventListener('submit', registerHandler);
        });
    </script>
</body>
</html>
