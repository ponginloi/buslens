<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置新密码 - BusLens</title>
    <script>
    var SUPABASE_URL = 'https://keeybzxxkjxvlvhjjdpr.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_SpzHfgcLn0deJWoqEPJQ4g_2jzyXXci';
    var SESSION_KEY = 'bus_user_session';
    </script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f2f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(26, 115, 232, 0.15);
        }
        .logo { font-size: 48px; display: block; text-align: center; margin-bottom: 8px; }
        h1 { font-size: 24px; color: #1a73e8; text-align: center; margin-bottom: 4px; }
        p { color: #888; font-size: 14px; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: #1a73e8; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26, 115, 232, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; display: none; }
        .message.error { display: block; background: #fee8e8; color: #d32f2f; }
        .message.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .message.loading { display: block; background: #e8f0fe; color: #1a73e8; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #999; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #1a73e8; }
        .valid-token { color: #4caf50; text-align: center; margin-bottom: 16px; }
        .invalid-token { color: #f44336; text-align: center; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container">
    <span class="logo">🔑</span>
    <h1>设置新密码</h1>
    <p id="statusText">正在验证链接...</p>
    <div class="message" id="message"></div>
    <div id="resetFormContainer" style="display:none;">
        <form id="resetForm">
            <div class="form-group">
                <label>🔒 新密码</label>
                <input type="password" id="newPassword" placeholder="至少6位" required minlength="6">
            </div>
            <div class="form-group">
                <label>🔒 确认密码</label>
                <input type="password" id="confirmPassword" placeholder="再次输入新密码" required>
            </div>
            <button type="submit" class="btn" id="resetBtn">✅ 确认重置</button>
        </form>
    </div>
    <a href="login.html" class="back-link">← 返回登录</a>
</div>

<script>
var supabaseClient = null;
var SESSION_KEY = 'bus_user_session';

function initSupabase() {
    if (typeof supabase === 'undefined') {
        console.error('❌ Supabase SDK 未加载');
        return false;
    }
    try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log('✅ Supabase 初始化成功');
        return true;
    } catch (e) {
        console.error('❌ Supabase 初始化失败:', e);
        return false;
    }
}
initSupabase();

function showMessage(text, type) {
    var el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
}

// ============================================================
//  从 URL 获取 access_token
// ============================================================
function getAccessTokenFromURL() {
    var hash = window.location.hash;
    if (hash) {
        var params = new URLSearchParams(hash.substring(1));
        return params.get('access_token');
    }
    return null;
}

// ============================================================
//  验证链接是否有效
// ============================================================
async function verifyToken() {
    var token = getAccessTokenFromURL();
    var statusEl = document.getElementById('statusText');
    var formContainer = document.getElementById('resetFormContainer');

    if (!token) {
        statusEl.textContent = '❌ 无效的重置链接，请重新申请';
        statusEl.className = 'invalid-token';
        return;
    }

    try {
        // 尝试用 token 获取用户信息
        var { data, error } = await supabaseClient.auth.getUser(token);

        if (error || !data.user) {
            statusEl.textContent = '❌ 链接已过期或无效，请重新申请';
            statusEl.className = 'invalid-token';
            return;
        }

        statusEl.textContent = '✅ 验证通过！请设置新密码';
        statusEl.className = 'valid-token';
        formContainer.style.display = 'block';

        // 保存 token 供提交使用
        window._resetToken = token;

    } catch (error) {
        console.error('验证失败:', error);
        statusEl.textContent = '❌ 验证失败，请重新申请';
        statusEl.className = 'invalid-token';
    }
}

// ============================================================
//  提交新密码
// ============================================================
document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    var newPassword = document.getElementById('newPassword').value;
    var confirmPassword = document.getElementById('confirmPassword').value;
    var btn = document.getElementById('resetBtn');
    var token = window._resetToken;

    if (newPassword.length < 6) {
        showMessage('❌ 密码至少6位', 'error');
        return;
    }

    if (newPassword !== confirmPassword) {
        showMessage('❌ 两次密码不一致', 'error');
        return;
    }

    if (!token) {
        showMessage('❌ 链接已失效，请重新申请', 'error');
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 更新中...';
    showMessage('⏳ 正在更新密码...', 'loading');

    try {
        // 用 token 更新密码
        var { data, error } = await supabaseClient.auth.updateUser({
            password: newPassword
        }, {
            headers: {
                Authorization: 'Bearer ' + token
            }
        });

        if (error) {
            throw new Error(error.message);
        }

        showMessage('✅ 密码重置成功！请用新密码登录', 'success');
        btn.textContent = '✅ 已重置';
        document.getElementById('resetFormContainer').style.display = 'none';
        document.getElementById('statusText').textContent = '✅ 密码已重置，请返回登录';

        setTimeout(function() {
            window.location.href = 'login.html';
        }, 3000);

    } catch (error) {
        console.error('重置失败:', error);
        showMessage('❌ ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = '✅ 确认重置';
    }
});

// ============================================================
//  启动验证
// ============================================================
verifyToken();
</script>
</body>
</html>
