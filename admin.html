    <script>
        var SUPABASE_URL = 'https://keeybzxxkjxvlvhjjdpr.supabase.co';

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .navbar {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-radius: 16px;
            margin-bottom: 20px;

        }
        .navbar .brand {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
        }
        .navbar .brand span {
            font-size: 26px;
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .navbar .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .navbar .nav-links a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        .navbar .nav-links a.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .navbar .nav-links .user-name {
            color: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            font-size: 14px;
        }
        .navbar .nav-links .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .navbar .nav-links .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .navbar .nav-links .admin-badge {
            background: #ff6b35;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
        }
        .navbar .nav-links .pending-badge {
            background: #ff9800;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stats-bar .stat {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .stats-bar .stat .num {
            font-size: 24px;
            font-weight: 700;
        }
        .stats-bar .stat .label {
            font-size: 12px;
            color: #888;
        }
        .stats-bar .stat.pending .num {
            color: #ff9800;
        }
        .stats-bar .stat.approved .num {
            color: #4caf50;
        }
        .stats-bar .stat.rejected .num {
            color: #f44336;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            flex-wrap: wrap;
        }
        .tab-bar .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-bar .tab:hover {
            background: #f0f2f5;
        }
        .tab-bar .tab.active {
            background: #1a73e8;
            color: white;
        }
        .tab-bar .tab .badge {
            background: #ff9800;
            color: white;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 4px;
        }
        .tab-bar .tab.active .badge {
            background: rgba(255, 255, 255, 0.3);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .spot-card {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #ff9800;
            transition: box-shadow 0.2s;
        }
        .spot-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .spot-card .top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }
        .spot-card .name {
            font-size: 18px;
            font-weight: 700;
            color: #1a73e8;
        }
        .spot-card .meta {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .spot-card .meta span {
            margin-right: 12px;
        }
        .spot-card .rank-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            color: white;
        }
        .spot-card .rank-badge.high {
            background: #ff4444;
        }
        .spot-card .rank-badge.medium {
            background: #ffbb33;
            color: #333;
        }
        .spot-card .rank-badge.low {
            background: #00c851;
        }
        .spot-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .spot-card .status-badge.pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .spot-card .desc {
            color: #555;
            font-size: 14px;
            margin: 8px 0;
        }

        .spot-card .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .spot-card .photo-grid img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .spot-card .photo-grid img:hover {
            transform: scale(1.05);
        }
        .spot-card .photo-grid .no-photo {
            color: #999;
            font-size: 13px;
            padding: 4px 0;
        }

        .spot-card .detail-toggle {
            background: none;
            border: none;
            color: #1a73e8;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 0;
            margin-top: 6px;
        }
        .spot-card .detail-toggle:hover {
            text-decoration: underline;
        }

        .spot-card .detail-panel {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #333;
        }
        .spot-card .detail-panel.open {
            display: block;
        }
        .spot-card .detail-panel .row {
            display: flex;
            padding: 4px 0;
        }
        .spot-card .detail-panel .row .label {
            font-weight: 500;
            color: #666;
            width: 80px;
            flex-shrink: 0;
        }
        .spot-card .detail-panel .row .value {
            color: #333;
            word-break: break-all;
        }

        .spot-card .review-form {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .spot-card .review-form .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }
        .spot-card .review-form .form-row label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            min-width: 60px;
        }
        .spot-card .review-form .form-row select {
            padding: 8px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }
        .spot-card .review-form .form-row select:focus {
            border-color: #1a73e8;
        }
        .spot-card .review-form .form-row input[type="text"] {
            flex: 1;
            min-width: 150px;
            padding: 8px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .spot-card .review-form .form-row input[type="text"]:focus {
            border-color: #1a73e8;
        }

        .spot-card .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .spot-card .actions button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .spot-card .actions button:hover {
            transform: translateY(-1px);
        }
        .spot-card .actions .btn-approve {
            background: #4caf50;
            color: white;
        }
        .spot-card .actions .btn-approve:hover {
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .spot-card .actions .btn-reject {
            background: #f44336;
            color: white;
        }
        .spot-card .actions .btn-reject:hover {
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }
        .spot-card .actions .btn-delete {
            background: #eee;
            color: #666;
        }
        .spot-card .actions .btn-delete:hover {
            background: #ddd;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            background: white;
            border-radius: 12px;
        }
        .empty-state .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #4caf50;
        }
        .toast.error {
            background: #f44336;
        }

        .access-denied {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 16px;
        }
        .access-denied .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }
        .access-denied h2 {
            color: #f44336;
            margin-bottom: 8px;
        }
        .access-denied p {
            color: #888;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .spot-card .photo-grid img {
                width: 80px;
                height: 60px;
            }
            .spot-card .detail-panel .row {
                flex-direction: column;
            }
            .spot-card .detail-panel .row .label {
                width: auto;
            }
            .tab-bar .tab {
                font-size: 12px;
                padding: 6px 12px;
            }
            .spot-card .review-form .form-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="brand"><span>🚌</span> BusLens</a>
            <div class="nav-links" id="navLinks"></div>
        </nav>

        <div class="stats-bar">
            <div class="stat pending"><div class="num" id="statPending">0</div><div class="label">⏳ 待审核机位</div></div>
            <div class="stat pending" style="border-left:3px solid #ff9800;"><div class="num" id="statPhotoPending">0</div><div class="label">📸 待审核照片</div></div>
            <div class="stat approved"><div class="num" id="statApproved">0</div><div class="label">✅ 已通过</div></div>
            <div class="stat rejected"><div class="num" id="statRejected">0</div><div class="label">❌ 已拒绝</div></div>
            <div class="stat"><div class="num" id="statTotal">0</div><div class="label">📊 总计</div></div>
        </div>

        <div class="tab-bar">
            <button class="tab active" data-tab="spots" onclick="switchTab('spots')">📍 机位审核 <span class="badge" id="spotBadge">0</span></button>
            <button class="tab" data-tab="photos" onclick="switchTab('photos')">📸 照片审核 <span class="badge" id="photoBadge">0</span></button>
        </div>

        <div id="tabSpots" class="tab-content active"><div id="spotList"></div></div>
        <div id="tabPhotos" class="tab-content"><div id="photoList"></div></div>

        <a href="index.html" class="back-link">← 返回地图</a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  初始化 Supabase
        // ============================================================
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }
        initSupabase();

        // ============================================================
        //  用户状态
        // ============================================================
        var SESSION_KEY = 'bus_user_session';
        var ADMIN_USERNAME = 'ponginloi';

        function getCurrentUser() {
            try { var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.href = 'index.html';
        }

        function isAdmin() {
            var user = getCurrentUser();
            return user && user.username === ADMIN_USERNAME;
        }

        function renderNav() {
            var nav = document.getElementById('navLinks');
            var user = getCurrentUser();
            if (user) {
                var admin = isAdmin();
                var pendingCount = window._pendingCount || 0;
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="profile.html">👤 个人中心</a>' +
                    (admin ? '<a href="admin.html" class="active">⚙️ 审核</a>' : '') +
                    (admin && pendingCount > 0 ? '<span class="pending-badge">📋 待审核 ' + pendingCount + '</span>' : '') +
                    '<a href="upload.html">📤 新机位</a>' +
                    '<span class="user-name">👤 ' + user.username + (admin ? '<span class="admin-badge">管理员</span>' : '') +
                    '</span>' +
                    '<button class="btn-logout" onclick="logout()">退出</button>';
            } else {
                nav.innerHTML = '<a href="index.html">🏠 地图</a><a href="login.html">登录</a><a href="register.html">注册</a>';
            }
        }

        function showToast(text, type) {
            var el = document.getElementById('toast');
            el.textContent = text;
            el.className = 'toast ' + (type || '') + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(function() { el.className = 'toast'; }, 3000);
        }

        // ============================================================
        //  Tab 切换
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-bar .tab').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach(function(el) {
                el.classList.remove('active');
            });
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        }

        // ============================================================
        //  查找待审核机位
        // ============================================================
        var allSpots = [];

        function findPendingSpot(index) {
            var pending = allSpots.filter(function(s) { return s.status === 'pending'; });
            return pending[index] || null;
        }

        // ============================================================
        //  机位审核操作
        // ============================================================
        function approveSpot(index) {
            var spot = findPendingSpot(index);
            if (!spot) { showToast('❌ 未找到目标', 'error'); return; }

            var rankSelect = document.getElementById('spot_rank_' + index);
            var reasonInput = document.getElementById('spot_reason_' + index);

            var selectedRank = rankSelect ? rankSelect.value : 'medium';
            var reason = reasonInput ? reasonInput.value.trim() || '审核通过' : '审核通过';

            if (!confirm('确认通过「' + spot.name + '」？\n等级：' + getRankLabel(selectedRank))) return;
            handleSpotAction(spot, 'approved', selectedRank, reason);
        }

        function rejectSpot(index) {
            var spot = findPendingSpot(index);
            if (!spot) { showToast('❌ 未找到目标', 'error'); return; }
            var reason = document.getElementById('spot_reason_' + index)?.value.trim() || '审核拒绝';
            if (!confirm('确认拒绝「' + spot.name + '」？')) return;
            handleSpotAction(spot, 'rejected', null, reason);
        }

        function deleteSpot(index) {
            var spot = findPendingSpot(index);
            if (!spot) { showToast('❌ 未找到目标', 'error'); return; }
            if (!confirm('确认删除「' + spot.name + '」？此操作不可恢复！')) return;
            handleSpotAction(spot, 'deleted', null, null);
        }

        function getRankLabel(rank) {
            var map = { high: '上等 ⭐⭐⭐', medium: '中等 ⭐⭐', low: '下等 ⭐' };
            return map[rank] || rank;
        }

        function handleSpotAction(spot, action, rank, reason) {
            if (!isAdmin()) { showToast('❌ 只有管理员可以审核', 'error'); return; }

            try {
                if (action === 'deleted') {
                    supabaseClient
                        .from('spots')
                        .delete()
                        .eq('id', spot.id)
                        .then(function(res) {
                            if (res.error) throw new Error(res.error.message);
                            showToast('🗑️ 已删除', 'error');
                            loadData();
                        })
                        .catch(function(error) {
                            showToast('❌ 操作失败：' + error.message, 'error');
                        });
                } else {
                    var updateData = {
                        status: action,
                        reviewed_by: 'ponginloi',
                        reviewed_at: new Date().toISOString().slice(0, 10),
                        review_reason: reason
                    };

                    if (action === 'approved' && rank) {
                        updateData.rank = rank;
                    }

                    supabaseClient
                        .from('spots')
                        .update(updateData)
                        .eq('id', spot.id)
                        .then(function(res) {
                            if (res.error) throw new Error(res.error.message);
                            showToast(action === 'approved' ? '✅ 已通过（等级：' + getRankLabel(rank) + '）' :
                                '❌ 已拒绝',
                                action === 'approved' ? 'success' : 'error');
                            loadData();
                        })
                        .catch(function(error) {
                            showToast('❌ 操作失败：' + error.message, 'error');
                        });
                }
            } catch (error) {
                showToast('❌ 操作失败：' + error.message, 'error');
            }
        }

        // ============================================================
        //  照片审核操作
        // ============================================================
        function approvePhoto(photoId) {
            var reason = document.getElementById('photo_reason_' + photoId)?.value || '审核通过';
            if (!confirm('确认通过此照片？')) return;
            handlePhotoAction(photoId, 'approved', reason);
        }

        function rejectPhoto(photoId) {
            var reason = document.getElementById('photo_reason_' + photoId)?.value || '审核拒绝';
            if (!confirm('确认拒绝此照片？')) return;
            handlePhotoAction(photoId, 'rejected', reason);
        }

        function deletePhoto(photoId) {
            if (!confirm('确认删除此照片？此操作不可恢复！')) return;
            handlePhotoAction(photoId, 'deleted', null);
        }

        function handlePhotoAction(photoId, action, reason) {
            if (!isAdmin()) { showToast('❌ 只有管理员可以审核', 'error'); return; }

            var targetSpot = null;
            var targetPhoto = null;

            for (var i = 0; i < allSpots.length; i++) {
                var spot = allSpots[i];
                if (spot.photos) {
                    for (var j = 0; j < spot.photos.length; j++) {
                        if (spot.photos[j].id === photoId) {
                            targetSpot = spot;
                            targetPhoto = spot.photos[j];
                            break;
                        }
                    }
                    if (targetPhoto) break;
                }
            }

            if (!targetPhoto) { showToast('❌ 未找到照片', 'error'); return; }

            try {
                var photos = targetSpot.photos || [];
                if (action === 'deleted') {
                    photos = photos.filter(function(p) { return p.id !== photoId; });
                } else {
                    for (var k = 0; k < photos.length; k++) {
                        if (photos[k].id === photoId) {
                            photos[k].status = action;
                            photos[k].reviewed_by = 'ponginloi';
                            photos[k].reviewed_at = new Date().toISOString().slice(0, 10);
                            photos[k].review_reason = reason;
                            break;
                        }
                    }
                }

                supabaseClient
                    .from('spots')
                    .update({ photos: photos })
                    .eq('id', targetSpot.id)
                    .then(function(res) {
                        if (res.error) throw new Error(res.error.message);
                        showToast(action === 'approved' ? '✅ 照片已通过' : action === 'rejected' ? '❌ 照片已拒绝' :
                            '🗑️ 照片已删除',
                            action === 'approved' ? 'success' : 'error');
                        loadData();
                    })
                    .catch(function(error) {
                        showToast('❌ 操作失败：' + error.message, 'error');
                    });
            } catch (error) {
                showToast('❌ 操作失败：' + error.message, 'error');
            }
        }

        // ============================================================
        //  渲染机位列表
        // ============================================================
        function renderSpots() {
            var pending = allSpots.filter(function(s) { return s.status === 'pending'; });
            var container = document.getElementById('spotList');
            document.getElementById('spotBadge').textContent = pending.length;

            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="icon">🎉</span><p>暂无待审核的机位</p></div>';
                return;
            }

            var html = '';
            pending.forEach(function(spot, idx) {
                var userRank = spot.rank || '未选择';

                var photosHtml = '';
                if (spot.example_photo) {
                    photosHtml += '<img src="' + spot.example_photo + '" onclick="window.open(\'' + spot.example_photo +
                        '\',\'_blank\')" title="例图" />';
                }
                if (spot.photos && spot.photos.length > 0) {
                    spot.photos.forEach(function(p) {
                        if (p.status !== 'rejected') {
                            photosHtml += '<img src="' + p.url + '" onclick="window.open(\'' + p.url +
                                '\',\'_blank\')" title="' + (p.caption || '用户照片') + '" />';
                        }
                    });
                }
                if (!photosHtml) {
                    photosHtml = '<span class="no-photo">📷 暂无图片</span>';
                }

                html +=
                    '<div class="spot-card">' +
                    '<div class="top">' +
                    '<div>' +
                    '<div class="name">' + spot.name + '</div>' +
                    '<div class="meta">' +
                    '<span>👤 ' + (spot.created_by || '未知') + '</span>' +
                    '<span>📅 ' + (spot.created_at || '未知') + '</span>' +
                    '<span>📌 用户建议等级：<strong>' + userRank + '</strong></span>' +
                    '<span class="status-badge pending">⏳ 待审核</span>' +
                    '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="desc">' + (spot.description || '暂无描述') + '</div>' +
                    '<div class="photo-grid">' + photosHtml + '</div>' +
                    '<button class="detail-toggle" onclick="toggleDetail(' + idx +
                    ')">📋 查看完整信息 ▼</button>' +
                    '<div class="detail-panel" id="detail_panel_' + idx + '">' +
                    '<div class="row"><span class="label">📍 坐标</span><span class="value">' + spot.lng + ', ' + spot
                    .lat + '</span></div>' +
                    '<div class="row"><span class="label">📤 上传者</span><span class="value">' + (spot.created_by ||
                        '未知') + '</span></div>' +
                    '<div class="row"><span class="label">📅 创建时间</span><span class="value">' + (spot.created_at ||
                        '未知') + '</span></div>' +
                    '<div class="row"><span class="label">⭐ 用户建议等级</span><span class="value">' + userRank +
                    '</span></div>' +
                    '<div class="row"><span class="label">📝 描述</span><span class="value">' + (spot.description ||
                        '暂无描述') + '</span></div>' +
                    '</div>' +

                    '<div class="review-form">' +
                    '<div class="form-row">' +
                    '<label>⭐ 最终等级</label>' +
                    '<select id="spot_rank_' + idx + '">' +
                    '<option value="high" ' + (spot.rank === 'high' ? 'selected' : '') + '>🔴 上等</option>' +
                    '<option value="medium" ' + (spot.rank === 'medium' || !spot.rank ? 'selected' : '') + '>🟡 中等</option>' +
                    '<option value="low" ' + (spot.rank === 'low' ? 'selected' : '') + '>🟢 下等</option>' +
                    '</select>' +
                    '</div>' +
                    '<div class="form-row">' +
                    '<label>📝 审核理由</label>' +
                    '<input type="text" id="spot_reason_' + idx + '" placeholder="填写审核意见..." />' +
                    '</div>' +
                    '</div>' +

                    '<div class="actions">' +
                    '<button class="btn-approve" onclick="approveSpot(' + idx + ')">✅ 通过</button>' +
                    '<button class="btn-reject" onclick="rejectSpot(' + idx + ')">❌ 拒绝</button>' +
                    '<button class="btn-delete" onclick="deleteSpot(' + idx + ')">🗑️ 删除</button>' +
                    '</div>' +
                    '</div>';
            });
            container.innerHTML = html;
        }

        // ============================================================
        //  渲染照片列表
        // ============================================================
        function renderPhotos() {
            var pendingPhotos = [];

            allSpots.forEach(function(spot) {
                if (spot.photos) {
                    spot.photos.forEach(function(p) {
                        if (p.status === 'pending') {
                            pendingPhotos.push({ photo: p, spotName: spot.name, spotId: spot.id });
                        }
                    });
                }
            });

            var container = document.getElementById('photoList');
            document.getElementById('photoBadge').textContent = pendingPhotos.length;
            document.getElementById('statPhotoPending').textContent = pendingPhotos.length;

            if (pendingPhotos.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="icon">🎉</span><p>暂无待审核的照片</p></div>';
                return;
            }

            var html = '';
            pendingPhotos.forEach(function(item) {
                var p = item.photo;
                html +=
                    '<div class="spot-card" style="border-left-color:#ff6b35;">' +
                    '<div class="top">' +
                    '<div>' +
                    '<div class="name">📸 ' + item.spotName + '</div>' +
                    '<div class="meta">' +
                    '<span>👤 ' + (p.uploader || p.uploaderName || '未知') + '</span>' +
                    '<span>📅 ' + (p.date || '未知') + '</span>' +
                    (p.caption ? '<span>📝 ' + p.caption + '</span>' : '') +
                    '<span class="status-badge pending">⏳ 待审核</span>' +
                    '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="photo-grid">' +
                    '<img src="' + p.url + '" onclick="window.open(\'' + p.url + '\',\'_blank\')" style="width:200px;height:150px;" />' +
                    '</div>' +
                    '<div class="review-form">' +
                    '<div class="form-row">' +
                    '<label>📝 审核理由</label>' +
                    '<input type="text" id="photo_reason_' + p.id + '" placeholder="填写审核意见..." />' +
                    '</div>' +
                    '</div>' +
                    '<div class="actions">' +
                    '<button class="btn-approve" onclick="approvePhoto(\'' + p.id + '\')">✅ 通过</button>' +
                    '<button class="btn-reject" onclick="rejectPhoto(\'' + p.id + '\')">❌ 拒绝</button>' +
                    '<button class="btn-delete" onclick="deletePhoto(\'' + p.id + '\')">🗑️ 删除</button>' +
                    '</div>' +
                    '</div>';
            });
            container.innerHTML = html;
        }

        // ============================================================
        //  切换详情
        // ============================================================
        function toggleDetail(index) {
            var panel = document.getElementById('detail_panel_' + index);
            if (panel) {
                panel.classList.toggle('open');
            }
        }

        // ============================================================
        //  加载数据
        // ============================================================
        function loadData() {
            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    allSpots = res.data || [];

                    var pending = allSpots.filter(function(s) { return s.status === 'pending'; });
                    var approved = allSpots.filter(function(s) { return s.status === 'approved'; });
                    var rejected = allSpots.filter(function(s) { return s.status === 'rejected'; });

                    document.getElementById('statPending').textContent = pending.length;
                    document.getElementById('statApproved').textContent = approved.length;
                    document.getElementById('statRejected').textContent = rejected.length;
                    document.getElementById('statTotal').textContent = allSpots.length;

                    // ✅ 更新待审核数量，供导航栏使用
                    window._pendingCount = pending.length;
                    renderNav();

                    renderSpots();
                    renderPhotos();
                })
                .catch(function(error) {
                    console.error('加载失败:', error);
                    document.getElementById('spotList').innerHTML =
                        '<div class="empty-state"><span class="icon">⚠️</span><p>加载失败：' + error.message + '</p></div>';
                    document.getElementById('photoList').innerHTML =
                        '<div class="empty-state"><span class="icon">⚠️</span><p>加载失败：' + error.message + '</p></div>';
                });
        }

        // ============================================================
        //  启动
        // ============================================================
        (function init() {
            renderNav();
            var user = getCurrentUser();

            if (!user) {
                document.getElementById('spotList').innerHTML =
                    '<div class="access-denied"><span class="icon">🔒</span><h2>请先登录</h2><p><a href="login.html">去登录 →</a></p></div>';
                document.getElementById('photoList').innerHTML = '';
                return;
            }

            if (user.username !== ADMIN_USERNAME) {
                document.getElementById('spotList').innerHTML =
                    '<div class="access-denied"><span class="icon">🚫</span><h2>权限不足</h2><p>只有管理员 <strong>' +
                    ADMIN_USERNAME + '</strong> 可以审核</p><p><a href="index.html">返回地图 →</a></p></div>';
                document.getElementById('photoList').innerHTML = '';
                return;
            }

            loadData();
            setInterval(loadData, 30000);
        })();
    </script>
</body>
</html>
