        var apiSupabaseClient = null;

        function initApiClient() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;

            if (!apiSupabaseClient) {
                try {
                    apiSupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('✅ API 客户端初始化成功');
                } catch (e) {
                    console.error('❌ API 客户端初始化失败:', e);
                    return false;
                }
            }
            return true;
        }

        async function getApiKey(keyName) {
            if (!initApiClient()) return null;
            try {
                const { data, error } = await apiSupabaseClient
                    .rpc('get_api_key', { key_name: keyName });
                if (error) {
                    console.error('❌ 获取 API 密钥失败:', error);
                    return null;
                }
                return data;

    <script>
        // ============================================================
        //  Supabase 主客户端
        // ============================================================
        var supabaseClient = null;

        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase SDK 未加载');
                return false;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('❌ Supabase 初始化失败:', e);
                return false;
            }
        }
        initSupabase();

        // ============================================================
        //  用户状态
        // ============================================================
        function getCurrentUser() {
            try { var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function logout() {
            var user = getCurrentUser();
            if (user && ADMIN_USERNAMES.indexOf(user.username) !== -1) {
                supabaseClient
                    .from('users')
                    .update({ is_online: false })
                    .eq('id', user.id)
                    .then(function() {
                        sessionStorage.removeItem(SESSION_KEY);
                        window.location.href = 'index.html';
                    })
                    .catch(function() {
                        sessionStorage.removeItem(SESSION_KEY);
                        window.location.href = 'index.html';
                    });
            } else {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = 'index.html';
            }
        }

        function isAdmin() {
            var user = getCurrentUser();
            return user && ADMIN_USERNAMES.indexOf(user.username) !== -1;
        }

        function renderNav() {
            var nav = document.getElementById('navLinks');
            var user = getCurrentUser();

                var pendingCount = window._pendingCount || 0;

                    (admin && pendingCount > 0 ? '<span class="pending-badge">📋 待审核 ' + pendingCount + '</span>' : '') +
                    '<a href="upload.html">📤 新机位</a>' +

                    '<button class="btn-logout" onclick="logout()">退出</button>';

                if (admin) {
                    document.getElementById('adminHint').style.display = 'inline-block';
                    document.getElementById('adminTip').style.display = 'flex';
                }
            } else {
                nav.innerHTML =
                    '<a href="index.html">🏠 地图</a>' +
                    '<a href="discover.html" class="active">🔍 发现</a>' +
                    '<a href="login.html">登录</a>' +
                    '<a href="register.html">注册</a>';
                document.getElementById('adminHint').style.display = 'none';
                document.getElementById('adminTip').style.display = 'none';
            }
        }

        function showToast(text, type) {
            var el = document.getElementById('toast');
            el.textContent = text;
            el.className = 'toast ' + (type || '') + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(function() { el.className = 'toast'; }, 3000);
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        function getRankLabel(rank) {
            var map = { high: '上等 ⭐⭐⭐', medium: '中等 ⭐⭐', low: '下等 ⭐' };
            return map[rank] || rank;
        }

        function getDeviceLabel(device) {
            var map = { phone: '📱 手机', camera: '📷 相机', both: '📱📷 两者皆可', unknown: '❓ 未指定' };
            return map[device] || '❓ 未指定';
        }

        // ============================================================
        //  🚀 滚动懒加载
        // ============================================================
        function initLazyLoad() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                    var src = el.dataset.src;
                    if (src) {
                        var img = document.createElement('img');
                        img.src = src;
                        img.alt = '';
                        img.loading = 'lazy';
                        el.parentNode.replaceChild(img, el);
                    }
                });
                return;
            }

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var el = entry.target;
                        var src = el.dataset.src;
                        if (src) {
                            var img = document.createElement('img');
                            img.src = src;
                            img.alt = '';
                            img.loading = 'lazy';
                            el.parentNode.replaceChild(img, el);
                            observer.unobserve(el);
                        }
                    }
                });
            }, {
                rootMargin: '100px',
                threshold: 0.01
            });

            document.querySelectorAll('.lazy-placeholder[data-src]').forEach(function(el) {
                observer.observe(el);
            });

            console.log('✅ 发现页懒加载已启动，共 ' + document.querySelectorAll('.lazy-placeholder[data-src]').length + ' 张待加载');
        }

        // ============================================================
        //  🎲 随机机位（仅上等）
        // ============================================================
        var allSpots = [];
        var randomSpot = null;

        function loadRandomSpot() {
            var container = document.getElementById('randomSpotContainer');
            container.innerHTML = '<div class="random-spot-card"><span class="loading-spinner">⟳</span><span style="color:#999;font-size:13px;margin-top:6px;">加载中...</span></div>';

            var highSpots = allSpots.filter(function(s) {
                return s.status === 'approved' && s.rank === 'high';
            });

            if (highSpots.length === 0) {
                container.innerHTML = '<div class="random-spot-card"><span class="spot-empty">⭐ 暂无上等机位</span></div>';
                return;
            }

            randomSpot = highSpots[Math.floor(Math.random() * highSpots.length)];

            var photos = randomSpot.photos || [];
            var validPhotos = photos.filter(function(p) { return p.status !== 'rejected'; });
            var thumbHtml = '';
            if (validPhotos.length > 0) {
                thumbHtml = '<img src="' + validPhotos[0].url + '" alt="' + randomSpot.name + '" class="spot-thumb" onclick="event.stopPropagation();window.open(\'' + validPhotos[0].url + '\',\'_blank\')" loading="lazy" />';
            } else if (randomSpot.example_photo) {
                thumbHtml = '<img src="' + randomSpot.example_photo + '" alt="' + randomSpot.name + '" class="spot-thumb" onclick="event.stopPropagation();window.open(\'' + randomSpot.example_photo + '\',\'_blank\')" loading="lazy" />';
            }

            container.innerHTML =
                '<div class="random-spot-card" onclick="goToRandomSpot()">' +
                '<div class="spot-name">' + randomSpot.name + '</div>' +
                '<span class="spot-rank-display">上等 ⭐⭐⭐</span>' +
                '<div class="spot-meta">📱 ' + getDeviceLabel(randomSpot.device_type) + ' ｜ 📤 ' + (randomSpot.created_by || '未知') + '</div>' +
                thumbHtml +
                '</div>';
        }

        function goToRandomSpot() {
            if (randomSpot) {
                window.location.href = 'index.html?spot_id=' + randomSpot.id;
            } else {
                showToast('⚠️ 请先加载随机机位', 'error');
            }
        }

        // ============================================================
        //  🔥 热门机位（上等机位中照片最多的）
        // ============================================================
        function loadHotSpots() {
            var container = document.getElementById('hotList');
            container.innerHTML = '<div class="hot-empty"><span class="loading-spinner">⟳</span> 加载中...</div>';

            var highSpots = allSpots.filter(function(s) {
                return s.status === 'approved' && s.rank === 'high';
            });

            if (highSpots.length === 0) {
                container.innerHTML = '<div class="hot-empty">⭐ 暂无上等机位</div>';
                document.getElementById('hotCount').textContent = '0';
                return;
            }

            var spotsWithPhotoCount = highSpots.map(function(s) {
                var photos = s.photos || [];
                var validPhotos = photos.filter(function(p) { return p.status !== 'rejected'; });
                return {
                    spot: s,
                    photoCount: validPhotos.length
                };
            });

            spotsWithPhotoCount.sort(function(a, b) {
                return b.photoCount - a.photoCount;
            });

            var topSpots = spotsWithPhotoCount.slice(0, 10);
            document.getElementById('hotCount').textContent = topSpots.length;

            if (topSpots.length === 0 || topSpots.every(function(item) { return item.photoCount === 0; })) {
                container.innerHTML = '<div class="hot-empty">📸 暂无上等机位有照片</div>';
                return;
            }

            var html = '';
            var rankNum = 0;
            topSpots.forEach(function(item) {
                if (item.photoCount === 0) return;
                rankNum++;
                var rankClass = '';
                if (rankNum === 1) rankClass = 'top1';
                else if (rankNum === 2) rankClass = 'top2';
                else if (rankNum === 3) rankClass = 'top3';

                var s = item.spot;
                html +=
                    '<a href="index.html?spot_id=' + s.id + '" class="hot-item">' +
                    '<span class="rank-num ' + rankClass + '">#' + rankNum + '</span>' +
                    '<div class="hot-info">' +
                    '<div class="hot-name">' + s.name + '</div>' +
                    '<div class="hot-meta">📤 ' + (s.created_by || '未知') + '</div>' +
                    '</div>' +
                    '<span class="hot-photo-count">📸 ' + item.photoCount + ' 张</span>' +
                    '</a>';
            });

            if (html === '') {
                container.innerHTML = '<div class="hot-empty">📸 暂无上等机位有照片</div>';
                return;
            }

            container.innerHTML = html;
        }

        // ============================================================
        //  📸 今日精选（从 featured_photos 表读取，is_active = true）
        // ============================================================
        function loadTodayPhotos() {
            var container = document.getElementById('photoGrid');
            container.innerHTML = '<div class="photo-empty"><span class="loading-spinner">⟳</span> 加载中...</div>';

            supabaseClient
                .from('featured_photos')
                .select('*')
                .eq('is_active', true)
                .order('display_order', { ascending: true })
                .limit(6)
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    var photos = res.data || [];

                    document.getElementById('photoCount').textContent = photos.length;

                    if (photos.length === 0) {
                        container.innerHTML = '<div class="photo-empty">📸 暂无今日精选<br><span style="font-size:12px;color:#bbb;">管理员可在「精选照片管理」中添加</span></div>';
                        return;
                    }

                    var html = '';
                    photos.forEach(function(p) {
                        var reasonText = p.reason || '✨ 精选好图';
                        html +=
                            '<div class="photo-item" onclick="openLightbox(\'' + p.photo_url + '\')">' +
                            '<div class="lazy-placeholder" data-src="' + p.photo_url + '">📷</div>' +
                            '<div class="photo-reason">' + reasonText + '</div>' +
                            '<div class="photo-overlay">' +
                            '<span>' + (p.caption || p.spot_name || '') + '</span>' +
                            '<span>📤 <a href="profile.html?user=' + encodeURIComponent(p.uploader || '') + '" onclick="event.stopPropagation();">' + (p.uploader || '未知') + '</a></span>' +
                            '</div>' +
                            '</div>';
                    });

                    container.innerHTML = html;

                    // ✅ 启动滚动懒加载
                    initLazyLoad();
                })
                .catch(function(error) {
                    console.error('加载今日精选失败:', error);
                    container.innerHTML = '<div class="photo-empty">❌ 加载失败</div>';
                });
        }

        // ============================================================
        //  📦 加载所有数据
        // ============================================================
        function loadAllData() {
            supabaseClient
                .from('spots')
                .select('*')
                .then(function(res) {
                    if (res.error) throw new Error(res.error.message);
                    allSpots = res.data || [];

                    var pending = allSpots.filter(function(s) { return s.status === 'pending'; });
                    window._pendingCount = pending.length;
                    renderNav();

                    loadRandomSpot();
                    loadHotSpots();
                    loadTodayPhotos();
                })
                .catch(function(error) {
                    console.error('加载数据失败:', error);
                    showToast('❌ 加载数据失败：' + error.message, 'error');
                });
        }

        // ============================================================
        //  启动
        // ============================================================
        renderNav();
        loadAllData();

        console.log('🔍 发现页面已加载（上等机位 + 按照片数排序 + 今日精选 + 懒加载 + 安全 API）');
        console.log('🔑 API 密钥已安全存储（前端不可见）');
    </script>
</body>
</html>
