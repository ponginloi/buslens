    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {

<body>
<div class="container">
    <span class="logo">🔑</span>
    <h1>重置密码</h1>
    <p>输入你注册时使用的邮箱，我们将发送重置链接</p>
    <div class="message" id="message"></div>
    <form id="resetForm">
        <div class="form-group">
            <label>📧 邮箱</label>
            <input type="email" id="email" placeholder="请输入你的邮箱" required>
        </div>
        <button type="submit" class="btn" id="resetBtn">发送重置邮件</button>
    </form>
    <a href="login.html" class="back-link">← 返回登录</a>
</div>
<script>
function showMessage(text, type) {
    var el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
}

document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var btn = document.getElementById('resetBtn');

    if (!email) {
        showMessage('❌ 请输入邮箱地址', 'error');
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 发送中...';
    showMessage('⏳ 正在发送重置邮件...', 'loading');

    try {
        const response = await fetch(
            'https://keeybzxxkjxvlvhjjdpr.supabase.co/functions/v1/reset-password',
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            }
        );

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || '发送失败');
        }

        showMessage('✅ 重置邮件已发送，请查收邮箱', 'success');
        btn.textContent = '✅ 已发送';
    } catch (error) {
        showMessage('❌ ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = '发送重置邮件';
    }
});
</script>
</body>
</html>
